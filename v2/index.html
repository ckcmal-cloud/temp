          { paraId: 2, eng: `In a single day I had matured astonishingly;`, kor: `단 하루 만에 나는 놀라울 정도로 성숙해졌는데,` },
          { paraId: 2, eng: `which means, no doubt, that I suddenly entered into conscious enjoyment of powers and sensibilities which had been developing unknown to me.`, kor: `이는 의심할 바 없이 나도 모르게 발전해 오던 능력과 감수성을 갑자기 의식적으로 즐기기 시작했음을 의미한다.` },
          { paraId: 3, eng: `The circumstances of which so many complain should be regarded as the very tools with which we are to work,`, kor: `그토록 많은 사람이 불평하는 환경은 우리가 일하는 데 필요한 바로` },
          { paraId: 3, eng: `and the stepping stones we are to mount by.`, kor: `그 도구이자 우리가 딛고 올라가야 할 디딤돌로 여겨져야 한다.` },
          { paraId: 3, eng: `They are the wind and tide in the voyage of life, which the skillful mariner generally either takes advantage of or overcomes.`, kor: `그것들은 인생이라는 항해에서의 바람과 조류와 같아서, 숙련된 항해사는 대개 그것을 이용하거나 극복해 낸다.` },
          { paraId: 4, eng: `When the subtle influence of spring has awakened almost all forms of vegetation,`, kor: `봄의 미묘한 영향이 거의 모든 형태의 식물을 깨우고,` },
          { paraId: 4, eng: `and millions of hidden plants that pass the winter beneath the soil have broken through the thick covering of dead leaves,`, kor: `흙 속에서 겨울을 보낸 수백만 개의 숨겨진 식물들이 두꺼운 낙엽 덮개를 뚫고 나올 때,` },
          { paraId: 4, eng: `there is no sweeter place in which to pass a few hours of idleness than the woodland.`, kor: `숲속보다 한가로운 몇 시간을 보내기에 더 달콤한 곳은 없다.` },
          { paraId: 5, eng: `There is a story of a clergyman who, preferring not to wear the usual clerical dress, said:`, kor: `평소 사제복 입는 것을 좋아하지 않았던 한 성직자가 "나는 동료들과 나를 구별 짓는 옷은` },
          { paraId: 5, eng: `"I will wear no clothes which will distinguish me from my fellow men." But when his remark was reported in the newspapers,`, kor: `입지 않겠습니다(I will wear no clothes which will distinguish me from my fellow men)"라고` },
          { paraId: 5, eng: `a comma was put in by mistake, and the sentence then read:`, kor: `말한 이야기가 있다. 하지만 그의 말이 신문에 보도될 때 실수로 쉼표가 찍혔고, 문장은` },
          { paraId: 5, eng: `'I will wear no clothes, which will distinguish me from my fellow men.'`, kor: `"나는 아무 옷도 입지 않을 것이며, 그것이 나를 동료들과 구별해 줄 것입니다"로 읽히게 되었다.` },
          { paraId: 6, eng: `The whole world of art and literature and learning is international;`, kor: `예술과 문학, 학문의 세계는 모두 국제적이다. 한 나라에서 이루어진 일은 그` },
          { paraId: 6, eng: `what is done in one country is not done for that country alone, but for mankind.`, kor: `나라만을 위한 것이 아니라 인류를 위한 것이다. 인류가 다른 어떤 동물` },
          { paraId: 6, eng: `If we ask ourselves what are the things that make us think the human race more valuable than any species of animals,`, kor: `종보다 더 가치 있다고 생각하게 만드는 것이 무엇인지 자문해 본다면,` },
          { paraId: 6, eng: `we will find that all are things in which the whole world can share.`, kor: `그것들이 모두 전 세계가 공유할 수 있는 것들임을 알게 될 것이다.` },
        ],
        "Day25": [
          { paraId: 0, eng: `What with heat and what with thirst, I became so impatient to get ashore,`, kor: `더위와 갈증 때문에 나는 해안에 상륙하고 싶어 안달이 났고,` },
          { paraId: 0, eng: `that when at last we glided towards the shore, I stood up in the bow of the boat ready to jump.`, kor: `마침내 우리가 해안을 향해 미끄러지듯 나아갈 때 배의 기수에 서서 뛰어내릴 준비를 했다.` },
          { paraId: 1, eng: `Society is like a building, which stands firm when its foundations are strong and all its timbers are sound.`, kor: `사회는 기초가 튼튼하고 모든 목재가 견고할 때 굳건히 서 있는 건물과 같다.` },
          { paraId: 1, eng: `The man who cannot be trusted is to society what a piece of rotten timber is to a house.`, kor: `신뢰할 수 없는 사람은 사회에 있어 집에 있는 썩은 목재 한 조각과 같은 존재이다.` },
          { paraId: 2, eng: `As the world grew older, men became more and more quarrelsome.`, kor: `세월이 흐르면서 인간은 점점 더 다투기를 좋아하게 되었다. 그들은 자신들이 발견한 밝은` },
          { paraId: 2, eng: `They quarrelled more sadly than ever over the possession of the bright yellow gold they had found;`, kor: `황금의 소유권을 두고 그 어느 때보다 비참하게 싸웠다. 그리고 무엇보다 최악인` },
          { paraId: 2, eng: `and, what was worst of all, they made sharp knives and other weapons out of iron, and fought fiercely with each other.`, kor: `것은 그들이 철로 날카로운 칼과 다른 무기들을 만들어 서로 맹렬히 싸웠다는 점이다.` },
          { paraId: 3, eng: `He who would do some great thing in this short life must apply himself to work with such a concentration of his forces as to idle spectators,`, kor: `이 짧은 인생에서 큰일을 해내고자 하는 사람은,` },
          { paraId: 3, eng: `who live only to amuse themselves, looks like madness.`, kor: `단지 즐거움을 위해 살아가는 한가한 구경꾼들에게는 광기처럼 보일 정도로 자신의 모든 힘을 집중하여 업무에 몰두해야 한다.` },
          { paraId: 4, eng: `There was not a line in her countenance, not a note in her soft and sleepy voice,`, kor: `그녀의 표정 한 줄기에서도,` },
          { paraId: 4, eng: `but spoke of an entire contentment with her life.`, kor: `부드럽고 나른한 목소리의 음조 하나에서도 자신의 삶에 대한 완전한 만족감 외에는 아무것도 느껴지지 않았다.` },
          { paraId: 4, eng: `It would have been fatuous arrogance to pity such a woman.`, kor: `그런 여성을 동정하는 것은 어리석은 오만이었을 것이다.` },
          { paraId: 5, eng: `I found the first two years of the curriculum very dull and gave my work no more attention than was necessary to scrape through the examinations.`, kor: `나는 처음 2년간의 교과 과정이 매우 지루하다는 것을 알게 되었고, 시험을 간신히 통과하는 데 필요한 정도 이상의 주의를 기울이지 않았다.` },
          { paraId: 5, eng: `I was an unsatisfactory student.`, kor: `나는 불성실한 학생이었다.` },
          { paraId: 6, eng: `One day when the President was riding in a car with General Bradley and me,`, kor: `어느 날 대통령이 브래들리 장군 그리고 나와 함께 차를 타고 가던 중,` },
          { paraId: 6, eng: `he fell to discussing the future of some of our war leaders.`, kor: `전쟁 지도자들 몇몇의 미래에 대해 논의하기 시작했다.` },
          { paraId: 6, eng: `I told him that I had no ambition except to retire to a quiet home and from there do what little I could to help our people understand some of the great changes the war had brought to the world.`, kor: `나는 조용한 집으로 은퇴하여 전쟁이 세상에 가져온 커다란 변화들을 우리 국민이 이해할 수 있도록 미력하나마 돕는 것 외에는 아무런 야망이 없다고 그에게 말했다.` },
        ],
        "Day26": [
          { paraId: 0, eng: `He now plainly saw that he was no better than a murderer;`, kor: `그는 이제 자신이 살인자나 다름없다는 것을 분명히 깨달았다. 그 발견으로 인한 극심한 고통은 삶을 견딜 수 없게 만들었고,` },
          { paraId: 0, eng: `the extreme anguish of which discovery made life insupportable, and drove him to fall on his sword.`, kor: `그를 자기 칼 위에 엎드러지게 만들었다.` },
          { paraId: 1, eng: `There is no man that carries guilt about him who does not receive a sting into his soul.`, kor: `죄책감을 안고 사는 사람치고 영혼에 가책을 느끼지 않는 사람은 없다.` },
          { paraId: 1, eng: `A guilty conscience needs no accuser, while a clear one fears none.`, kor: `죄 있는 양심에게는 고발자가 필요 없으며, 깨끗한 양심은 아무것도 두려워하지 않는다.` },
          { paraId: 2, eng: `I cannot recall a case of man or woman who ever occupied any considerable part of my thoughts that did not contribute towards my moral or physical welfare.`, kor: `내 생각의 상당 부분을 차지했던 남녀 중에서 나의 도덕적 혹은 신체적 안녕에 기여하지 않은 사람은 한 명도 기억나지 않는다.` },
          { paraId: 3, eng: `Whoever has to deal with young children soon learns that too much sympathy is a mistake.`, kor: `어린 아이들을 상대해야 하는 사람은 누구나 과도한 동정이 실수라는 것을 곧 배우게 된다.` },
          { paraId: 3, eng: `Too little sympathy is, of course, a worse mistake, but in this, as in everything else, each extreme is bad.`, kor: `물론 너무 적은 동정은 더 큰 실수이지만, 다른 모든 것과 마찬가지로 여기서도 양 극단은 좋지 않다.` },
          { paraId: 4, eng: `Many a man, no doubt, has been ruined by money,`, kor: `의심할 여지 없이 많은 사람이 돈 때문에 망하며,` },
          { paraId: 4, eng: `and on the whole, probably the rich err more in money matters than the poor.`, kor: `대체로 돈 문제에 있어서는 아마도 부자가 가난한 사람보다 더 많은 실수를 저지를 것이다.` },
          { paraId: 4, eng: `To none but the wise can wealth bring happiness.`, kor: `부(富)는 오직 현명한 사람에게만 행복을 가져다줄 수 있다.` },
          { paraId: 4, eng: `The man who is too eager to be rich will always be a poor fellow.`, kor: `부자가 되려고 너무 갈망하는 사람은 언제나 가련한(마음이 가난한) 사람으로 남을 것이다.` },
          { paraId: 5, eng: `The most beautiful and most profound emotion we can experience is the sensation of the mystical.`, kor: `우리가 경험할 수 있는 가장 아름답고 깊은 감정은 신비로움에 대한 느낌이다. 그것이` },
          { paraId: 5, eng: `It is the source of all true art and science.`, kor: `모든 진정한 예술과 과학의 근원이다. 이 감정을 낯설어하고, 더 이상 경이로움에 멈춰 서거나` },
          { paraId: 5, eng: `He to whom this emotion is a stranger, who can no longer pause to wonder and stand rapt in awe, is as good as dead: his eyes are closed.`, kor: `경외심에 사로잡히지 못하는 사람은 죽은 것이나 다름없다. 그의 눈은 감겨 있는 것이다.` },
          { paraId: 6, eng: `It is of far greater importance to a man in public life to make one friend who will hold out with him for twenty years,`, kor: `공적인 삶을 사는 사람에게는,` },
          { paraId: 6, eng: `than to find twenty followers in each year, losing as many or even a tenth part as many.`, kor: `매년 20명의 추종자를 얻고 그만큼 혹은 그 10분의 1이라도 잃는 것보다, 20년 동안 자신과 함께 견뎌줄 친구 한 명을 사귀는 것이 훨씬 더 중요하다.` },
        ],
        "Day27": [
          { paraId: 0, eng: `All our streets are lined with trees, and, like so many stars among the leaves and branches, the street lamps shed their light.`, kor: `우리의 모든 거리에는 가로수가 줄지어 서 있고, 잎사귀와 가지 사이에서 반짝이는 수많은 별들처럼 가로등이 빛을 비춘다.` },
          { paraId: 0, eng: `When we pass under them we notice how the light tinges the foliage that is nearest to it with a greenish ash-color.`, kor: `그 아래를 지날 때 우리는 전등 빛이 그와 가장 가까운 나뭇잎들을 어떻게 녹색이 감도는 회색빛으로 물들이는지 보게 된다.` },
          { paraId: 1, eng: `La Cachirra asked the boy if he had a novia,`, kor: `라 카치라는 그 소년에게 애인(novia)이 있는지 물었다. 그렇게 매력적인 청년이라면 분명` },
          { paraId: 1, eng: `a sweetheart, aware that so attractive a youth must enjoy the smiles of women,`, kor: `여인들의 미소를 한몸에 받고 있을 것임을 알았기 때문이다. 그녀는 소년이 저녁` },
          { paraId: 1, eng: `and she knew he lied when he swore he spent his evenings at work.`, kor: `시간을 일하며 보낸다고 맹세할 때 그가 거짓말을 하고 있다는 것을 알았다.` },
          { paraId: 2, eng: `The number of countries capable of developing nuclear weapons has increased to more than 20 in recent years.`, kor: `최근 핵무기를 개발할 능력이 있는 국가의 수가 20개국 이상으로 늘어났다.` },
          { paraId: 2, eng: `If the countries possessing the deadly weapons increase, the control of the weapons will become so much more difficult,`, kor: `이런 치명적인 무기를 보유한 국가가 늘어나면 무기 통제는 훨씬 더 어려워질 것이며,` },
          { paraId: 2, eng: `resulting in the emergence of nuclear anarchy and increasing the danger of a nuclear war.`, kor: `결국 핵 무정부 상태가 도래하고 핵전쟁의 위험이 커지는 결과를 초래할 것이다.` },
          { paraId: 3, eng: `While the dog is generally intelligent, one must remember that he has his limitations,`, kor: `개가 일반적으로 영리하긴 하지만,` },
          { paraId: 3, eng: `can absorb only so much at a time, and must not be forced in his training.`, kor: `개에게도 한계가 있으며 한 번에 받아들일 수 있는 양이 정해져 있으므로 훈련을 강요해서는 안 된다는 점을 기억해야 한다.` },
          { paraId: 4, eng: `We work so many hours a day, and, when we have allowed the necessary minimum for such activities as eating and shopping,`, kor: `우리는 하루에 정해진 시간 동안 일을 하며,` },
          { paraId: 4, eng: `the rest we spend in various activities which are known as recreations.`, kor: `식사나 쇼핑 같은 활동에 필요한 최소한의 시간을 제외한 나머지 시간은 '기분 전환(레크리에이션)'이라 불리는 다양한 활동을 하며 보낸다.` },
          { paraId: 5, eng: `Since our power on the earth's surface is entirely dependent on the supply of energy which the earth derives from the sun,`, kor: `지표면에서 우리가 내는 힘은 전적으로 지구가 태양으로부터 얻는 에너지 공급에 의존하고 있으므로,` },
          { paraId: 5, eng: `we are necessarily dependent upon the sun, and could hardly realize any of our wishes if the sun grew cold.`, kor: `우리는 필연적으로 태양에 의존하고 있으며 태양이 식어버린다면 우리의 어떤 소망도 거의 실현할 수 없을 것이다.` },
          { paraId: 6, eng: `I was never afraid of being alone at these times;`, kor: `나는 이런 때에 혼자 있는 것을 결코 두려워하지 않았다. 왜냐하면 나는 너무나 외딴곳에서 자랐기에,` },
          { paraId: 6, eng: `for I had been brought up in such an out-of-the-way place that the lack of human beings at night made me less fearful than the sight of them.`, kor: `밤에 사람이 없는 것이 사람을 마주치는 것보다 덜 무서웠기 때문이다.` },
        ],
        "Day28": [
          { paraId: 0, eng: `The French have always been regarded, and rightly, as the thriftiest of people.`, kor: `프랑스인들은 항상 가장 검소한 민족으로 여겨져 왔으며,` },
          { paraId: 0, eng: `Few Frenchmen live up to their incomes:`, kor: `이는 옳은 평가이다. 수입을 전부 다 써버리는 프랑스인은 거의 없다. 그들은 만약의 사태를 위해 돈을 저축하거나,` },
          { paraId: 0, eng: `they manage to put something aside for a rainy day, or better still, add to or found a little family fortune.`, kor: `더 나아가 가문의 적은 재산을 늘리거나 기초를 닦는다.` },
          { paraId: 1, eng: `A few stars are known which are hardly bigger than the earth,`, kor: `지구보다 거의 크지 않은 별들이 몇 개 알려져 있긴 하지만,` },
          { paraId: 1, eng: `but the majority are so large that hundreds of thousands of earths could be packed inside each and leave room to spare.`, kor: `대다수의 별은 수십만 개의 지구를 그 안에 집어넣고도 공간이 남을 정도로 매우 거대하다.` },
          { paraId: 2, eng: `It is important to learn early to rely upon yourself;`, kor: `일찍이 스스로 자립하는 법을 배우는 것이 중요하다. 왜냐하면 자신을 도와줄` },
          { paraId: 2, eng: `for little has been done in the world by those who are always looking out for someone to help them.`, kor: `누군가만을 항상 찾는 사람들에 의해 세상에서 이루어진 일은 거의 없기 때문이다.` },
          { paraId: 3, eng: `Among the greatest discoveries of science, quite a few have been made by accident.`, kor: `과학의 위대한 발견 중 적지 않은 것들이 우연히 이루어졌다.` },
          { paraId: 3, eng: `Setting out to reach a certain goal, the investigator chances in his way upon a law,`, kor: `특정 목표를 달성하려고 시작한 연구자가 그 과정에서 원래` },
          { paraId: 3, eng: `or an element, that had no place in his purpose.`, kor: `목적에는 없었던 법칙이나 원소를 우연히 발견하게 되는 것이다.` },
          { paraId: 3, eng: `The discovery is a by-product of his activity.`, kor: `그 발견은 그의 활동이 낳은 부산물이다.` },
          { paraId: 4, eng: `A little learning is not dangerous as long as you know that it is little.`, kor: `지식이 적다는 것은 당신이 그것이 적다는 것을 아는 한 위험하지 않다.` },
          { paraId: 4, eng: `Danger begins with thinking you know much more than you do.`, kor: `위험은 자신이 실제보다 훨씬 더 많이 알고 있다고 생각할 때 시작된다.` },
          { paraId: 4, eng: `It is not knowledge, be it great or small, but the conceit of knowledge, that misleads men.`, kor: `사람을 잘못된 길로 인도하는 것은 지식의 양(많든 적든)이 아니라, 지식에 대한 자만이다.` },
          { paraId: 5, eng: `I find the great thing in this world is, not so much where we stand, as in what direction we are moving.`, kor: `이 세상에서 중요한 것은 우리가 어디에 서 있느냐보다 어떤 방향으로 움직이고 있느냐에` },
          { paraId: 5, eng: `To reach the port we must sail sometimes with the wind and sometimes against it, —`, kor: `있다고 생각한다. 항구에 도착하려면 때로는 순풍을 타고 때로는 역풍을 맞으며 항해해야` },
          { paraId: 5, eng: `but we must sail, and not drift, nor lie at anchor.`, kor: `한다. 하지만 우리는 항해해야 하며, 표류하거나 닻을 내리고 머물러 있어서는 안 된다.` },
          { paraId: 6, eng: `He could not look her straight in the face.`, kor: `그는 그녀의 얼굴을 똑바로 쳐다보지 못했다.` },
          { paraId: 6, eng: `She, observant of this, kept a very steady eye on him, and spoke with all calmness possible.`, kor: `이를 알아챈 그녀는 그를 아주 흔들림 없는 눈빛으로 바라보며 가능한 한 침착하게 말을 이어갔다.` },
        ],
        "Day29": [
          { paraId: 0, eng: `Accustomed to playing the host in the highest circles, he charmed and dominated all whom he approached;`, kor: `상류 사회에서 주최자 역할을 하는 데 익숙했던 그는 자신이 다가가는` },
          { paraId: 0, eng: `there was something at once winning and authoritative in his address;`, kor: `모든 사람을 매료시키고 압도했다. 그의 말투에는 사람을 끄는 매력과 권위가 동시에` },
          { paraId: 0, eng: `and his extraordinary coolness gave him yet another distinction in this society.`, kor: `있었으며, 그의 비범한 냉철함은 이 사회에서 그를 더욱 돋보이게 했다.` },
          { paraId: 1, eng: `I was only five years old when my mother died,`, kor: `어머니가 돌아가셨을 때 나는 겨우 다섯` },
          { paraId: 1, eng: `but her image is as fresh in my mind, now that twenty years have elapsed,`, kor: `살이었지만, 20년이 지난 지금도 그녀의` },
          { paraId: 1, eng: `as it was at the time of her death.`, kor: `모습은 돌아가셨을 당시만큼이나 내 마음속에 생생하다.` },
          { paraId: 1, eng: `I remember her as a pale, gentle being, with a sweet smile, and a voice soft and cheerful.`, kor: `나는 그녀를 창백하고 온화한 존재로, 달콤한 미소와 부드럽고 쾌활한 목소리를 가진 분으로 기억한다.` },
          { paraId: 2, eng: `In the daily lives of most men and women, fear plays a greater part than hope:`, kor: `대부분의 남녀의 일상에서 두려움은 희망보다 더 큰 역할을 한다. 그들은 자신의` },
          { paraId: 2, eng: `they are more filled with the thought of the possessions that others may take from them,`, kor: `삶과 관계 맺는 타인의 삶 속에 만들어낼 수 있는 기쁨보다는, 남들이` },
          { paraId: 2, eng: `than of the joy that they might create in their own lives and in the lives with which they come in contact.`, kor: `자신에게서 빼앗아 갈지도 모르는 소유물에 대한 생각으로 더 가득 차 있다.` },
          { paraId: 3, eng: `The destiny of Man is not limited to his existence on earth.`, kor: `인간의 운명은 지상에서의 존재에 국한되지 않는다.` },
          { paraId: 3, eng: `He exists less by the actions performed during his life than by the wake he leaves behind him like a shooting star.`, kor: `인간은 살아서 행한 행동보다, 마치 유성처럼 뒤에 남기는 흔적에 의해 더 많이 존재한다.` },
          { paraId: 4, eng: `Often the people instinctively choose the right man;`, kor: `종종 국민은 본능적으로 적임자를 선택하지만,` },
          { paraId: 4, eng: `sometimes, unfortunately, their choice is determined by emotional tests unrelated to the hero's capacity for ruling,`, kor: `불행히도 가끔은 통치 능력과는 무관한 감정적인 시험에 의해 선택이 결정되기도 한다. 그리고 너무 늦게서야 자신들이 잘못된 사람을 뽑았으며,` },
          { paraId: 4, eng: `and they find too late that they have picked the wrong man and now cannot get rid of him as easily as they adopted him.`, kor: `그를 받아들였을 때만큼 쉽게 그를 제거할 수 없다는 사실을 깨닫게 된다.` },
          { paraId: 5, eng: `There is no love as unselfish as parental love.`, kor: `부모의 사랑만큼 사심 없는 사랑은 없다.` },
          { paraId: 5, eng: `There is nothing which true parents have more at heart than the highest welfare of their children.`, kor: `진정한 부모에게 자녀의 최고의 행복보다 더 간절한 것은 없다.` },
          { paraId: 5, eng: `There is no way in which a child can please father and mother better than by doing that which is for its own highest good.`, kor: `자녀가 부모님을 가장 기쁘게 해드리는 길은 자기 자신의 최선의 이익이 되는 일을 행하는 것보다 더 나은 방법은 없다.` },
          { paraId: 6, eng: `In some parts of the world there are great tracts of country called deserts.`, kor: `세계의 어떤 지역에는 사막이라고 불리는 거대한 땅이 있다.` },
          { paraId: 6, eng: `In these deserts nothing can be seen but sand, and stones and rocks, as far as the eye can see.`, kor: `이 사막에서는 눈이 닿는 곳 어디까지나 모래와 돌과 바위 외에는 아무것도 보이지 않는다.` },
        ],
        "Day30": [
          { paraId: 0, eng: `Language is a product of the human mind, and reflects its operations.`, kor: `언어는 인간 정신의 산물이며 그 작용을 반영한다.` },
          { paraId: 0, eng: `In as far, then, as the human mind is one and the same all the world over,`, kor: `그러므로 인간의 정신이 전 세계 어디에서나 동일한 한,` },
          { paraId: 0, eng: `human speech is bound to exhibit some common features wherever it comes into being.`, kor: `인간의 언어는 그것이 어디서 생겨나든 어떤 공통된 특징을 보일 수밖에 없다.` },
          { paraId: 1, eng: `We may sometimes think our country has done us personally an injury,`, kor: `우리는 때때로 국가가 우리 개인에게 해를 입혔다고 생각할 수도 있지만,` },
          { paraId: 1, eng: `but that gives us no more a right not to love our country than does an injury received from our father or mother give us a right to hate our father or mother.`, kor: `그렇다고 해서 국가를 사랑하지 않을 권리가 생기는 것은 아니다. 이는 부모님으로부터 입은 상처가 부모님을 미워할 권리를 주지 않는 것과 마찬가지다.` },
          { paraId: 2, eng: `We are never more in danger than when we think ourselves most secure,`, kor: `우리는 스스로가 가장 안전하다고 생각할 때 가장 위험하며,` },
          { paraId: 2, eng: `nor in reality more secure than when we seem to be in danger.`, kor: `실제로는 위험에 처해 있는 것처럼 보일 때 가장 안전하다.` },
          { paraId: 3, eng: `John was eight years older than she and for many years he paid her scanty attention,`, kor: `존은 그녀보다 여덟 살이 많았고 오랫동안 그녀에게 거의 관심을 기울이지` },
          { paraId: 3, eng: `though he took it for granted that eventually they would marry;`, kor: `않았지만, 결국에는 두 사람이 결혼할 것이라는 점은 당연하게 여겼다. 약혼` },
          { paraId: 3, eng: `the engagement papers had been signed while he was only a child and Judith no more than a baby.`, kor: `서류는 그가 고작 어린아이였고 주디스가 아기였을 때 이미 서명되었기 때문이다.` },
          { paraId: 4, eng: `We cannot create an observing faculty any more than we can create a memory, but we may do much to develop both.`, kor: `우리가 기억력을 만들어낼 수 없듯이 관찰 능력 또한 만들어낼 수는 없지만, 두 가지 모두를 발전시키기 위해 많은 노력을 기울일 수는 있다.` },
          { paraId: 5, eng: `It is a familiar saying that the only school where fools learn is the school of experience.`, kor: `바보들이 배우는 유일한 학교는 경험이라는 학교라는 친숙한 격언이 있다.` },
          { paraId: 5, eng: `If the lessons of experience are profitable to foolish students, much more must they be to the wise.`, kor: `경험의 교훈이 어리석은 학생들에게도 유익하다면, 현명한 사람들에게는 훨씬 더 유익할 것임에 틀림없다.` },
          { paraId: 6, eng: `Culture is not an ornament to decorate a phrase, still less to show off your knowledge,`, kor: `교양은 문장을 꾸미기 위한 장식품도 아니고,` },
          { paraId: 6, eng: `but a means, painfully acquired, to enrich the soul.`, kor: `하물며 지식을 뽐내기 위한 것은 더더욱 아니다. 그것은 고통스럽게 습득되어 영혼을 풍요롭게 하는 수단이다.` },
        ],
        "Day31": [
          { paraId: 0, eng: `Length of years is no proper test of length of life.`, kor: `수명(년수)은 삶의 길이를 재는 적절한 척도가 아니다.` },
          { paraId: 0, eng: `A man's life is to be measured by what he does in it, and what he feels in it.`, kor: `인간의 삶은 그 삶 속에서 무엇을 행하고 무엇을 느끼느냐로 측정되어야 한다.` },
          { paraId: 0, eng: `The more useful work the man does and the more he thinks and feels, the more he really lives.`, kor: `유익한 일을 더 많이 하고 더 많이 생각하고 느낄수록, 그는 진정으로 더 많이 사는 것이다.` },
          { paraId: 0, eng: `The idle, useless man, no matter to what extent his life may be prolonged, merely vegetates.`, kor: `나태하고 무익한 사람은 그 삶이 아무리 길게 연장된다 하더라도 그저 식물처럼 생존할 뿐이다.` },
          { paraId: 1, eng: `The political freedom we have today will never be too easy to preserve.`, kor: `오늘날 우리가 누리는 정치적 자유는 결코 지키기 쉬운 것이 아니다.` },
          { paraId: 1, eng: `It came out of struggle, and it may still demand struggle.`, kor: `그것은 투쟁을 통해 얻어졌으며, 여전히 투쟁을 요구할 수도 있다.` },
          { paraId: 1, eng: `It came out of wisdom and patience.`, kor: `그것은 지혜와 인내에서 비롯되었다.` },
          { paraId: 1, eng: `We may honor the fathers of the Declaration all the more because now that we ourselves live in a time of peril we can understand their danger and their courage.`, kor: `우리가 위험의 시대에 살고 있기에 그들의 위험과 용기를 이해할 수 있으므로, 우리는 독립 선언의 주역들을 더욱 존경하게 된다.` },
          { paraId: 2, eng: `"The weakest man," says Carlyle, "by concentrating his powers on a single object, can accomplish something;`, kor: `카라일은 이렇게 말한다. "가장 약한 사람이라도 자신의 힘을 하나의 목표에 집중함으로써 무언가를 성취할 수` },
          { paraId: 2, eng: `whereas the strongest, by dispersing his over many, may fail to accomplish anything."`, kor: `있다. 반면 가장 강한 사람이라도 그 힘을 여러 곳으로 분산시킨다면 아무것도 이루지 못할 수 있다."` },
          { paraId: 3, eng: `It was early and there was only one other person in the library.`, kor: `이른 시간이라 도서관에는 다른 사람 한 명뿐이었다.` },
          { paraId: 3, eng: `He was seated in a big leather chair absorbed in a book.`, kor: `그는 커다란 가죽 의자에 앉아 책에 몰두하고 있었다.` },
          { paraId: 3, eng: `I was surprised to see it was Larry.`, kor: `나는 그가 래리인 것을 보고 놀랐다.` },
          { paraId: 3, eng: `He was the last person I had expected to find in such a place.`, kor: `그는 내가 그런 장소에서 발견하리라고는 전혀 예상치 못한 사람이었기 때문이다.` },
          { paraId: 4, eng: `Resignation, however, has also its part to play in the conquest of happiness,`, kor: `그러나 체념 또한 행복을 쟁취하는 데 있어 나름의 역할이 있으며,` },
          { paraId: 4, eng: `and it is a part no less essential than that played by effort.`, kor: `그 역할은 노력의 역할 못지않게 필수적이다.` },
          { paraId: 4, eng: `The wise man, though he will not sit down under preventable misfortunes, will not waste time and emotion upon such as are unavoidable.`, kor: `현명한 사람은 막을 수 있는 불행에 굴복하지는 않겠지만, 피할 수 없는 불행에 시간과 감정을 낭비하지도 않을 것이다.` },
          { paraId: 5, eng: `Houses should be built so as to admit plenty of light as well as fresh air.`, kor: `집은 신선한 공기뿐만 아니라 충분한 빛이 들어오도록 지어져야 한다.` },
          { paraId: 5, eng: `The former is not less necessary than the latter to a healthy condition of body.`, kor: `전자(빛)는 후자(공기) 못지않게 신체의 건강한 상태를 위해 필수적이다.` },
          { paraId: 5, eng: `Just as plants, when deprived of light, become white in their stalks and leaves, so man becomes pale and unhealthy when he lives underground.`, kor: `빛을 빼앗긴 식물이 줄기와 잎이 하얗게 변하는 것처럼, 인간도 지하에서 살면 창백해지고 건강을 해치게 된다.` },
          { paraId: 6, eng: `Poor as the family were, young Sam Johnson had as much pride as any nobleman's son in England.`, kor: `그 가족은 가난했지만, 어린 샘 존슨은 영국의 어떤 귀족의 아들 못지않은 자부심을 가지고 있었다.` },
          { paraId: 6, eng: `The fact was, he felt conscious of uncommon sense and ability, which, in his opinion, entitled him to great respect from the world.`, kor: `사실 그는 자신이 비범한 감각과 능력을 갖추고 있음을 자각하고 있었고, 그것이 세상으로부터 큰 존경을 받을 자격을 자신에게 부여한다고 생각했다.` },
        ],
        "Day32": [
          { paraId: 0, eng: `As he had admitted he was in the wrong, there was nothing for it but to write an apology,`, kor: `자신이 틀렸음을 인정했으므로 사과문을 쓰는 것 외에는 방법이 없었는데,` },
          { paraId: 0, eng: `the composition of which was as disagreeable a task as ever had fallen to his lot.`, kor: `그 글을 쓰는 것은 그에게 주어진 일 중 가장 불쾌한 과업이었다.` },
          { paraId: 1, eng: `My family was by no means wealthy when I was born,`, kor: `내가 태어났을 때 우리 가족은 결코 부유하지 않았으며,` },
          { paraId: 1, eng: `and many decades were to pass before my father felt he was standing on firm ground.`, kor: `아버지가 기반이 튼튼해졌다고 느끼기까지 수십 년이 걸렸다.` },
          { paraId: 1, eng: `For as long as I remember my parents had to struggle with heavy financial problems that overshadowed my entire youth.`, kor: `내가 기억하는 한 부모님은 내 청춘 시절 전체를 어둡게 만든 심각한 경제적 문제와 싸워야 했다.` },
          { paraId: 2, eng: `Animals are happy so long as they have health and enough to eat.`, kor: `동물들은 건강하고 먹을 것이 충분하다면 행복하다.` },
          { paraId: 2, eng: `Human beings, one feels, ought to be, but they are not, at least in a great majority of cases.`, kor: `인간도 그래야 할 것 같지만, 적어도 대다수의 경우에는 그렇지 못하다.` },
          { paraId: 3, eng: `The island of Sicily lies as a triangle across the center of the Middle Sea.`, kor: `시칠리아 섬은 지중해 중심부에 삼각형 모양으로 놓여 있다.` },
          { paraId: 3, eng: `Few islands have been better favored by nature.`, kor: `자연의 축복을 이보다 더 잘 받은 섬은 드물다.` },
          { paraId: 3, eng: `Its climate is mild and its scenery beautiful.`, kor: `기후는 온화하고 풍경은 아름답다.` },
          { paraId: 3, eng: `But man has not been as kind to the island.`, kor: `그러나 인간은 그 섬에 그리 친절하지 않았다.` },
          { paraId: 3, eng: `Geography placed it to be an inevitable battle ground between the forces of Europe and Africa.`, kor: `지리적 위치 때문에 시칠리아는 유럽과 아프리카 세력 사이의 피할 수 없는 전쟁터가 되었다.` },
          { paraId: 4, eng: `As bad manners are infectious, so also are good manners.`, kor: `나쁜 예절이 전염되듯 좋은 예절도 전염된다.` },
          { paraId: 4, eng: `If we encounter incivility most of us are apt to become uncivil, but there is no one who can be disagreeable with sunny people.`, kor: `무례함을 겪으면 우리 대부분은 무례해지기 쉽지만, 밝고 명랑한 사람에게 불쾌하게 구는 사람은 아무도 없다.` },
          { paraId: 4, eng: `It is with manners as with the weather.`, kor: `예절도 날씨와 마찬가지다.` },
          { paraId: 5, eng: `The world is a very pleasant place to live in as soon as we accept the fact that other people have a right to live as well as ourselves and that the people who get in our way in the streets do not do so on purpose or out of malice.`, kor: `다른 사람들도 우리만큼이나 살 권리가 있다는 사실과 거리에서 우리의 길을 가로막는 사람들이 고의나 악의로 그러는 것이 아니라는 사실을 받아들이는 순간, 세상은 살기에 매우 즐거운 곳이 된다.` },
          { paraId: 6, eng: `No sooner had word spread that the white doctor had arrived, than he was surrounded with natives suffering from various kinds of diseases.`, kor: `백인 의사가 도착했다는 소문이 퍼지자마자, 그는 각종 질병으로 고통받는 원주민들에게 둘러싸였다.` },
        ],
        "Day33": [
          { paraId: 0, eng: `In these days when so many human beings are compelled to live in enormous cities where they so easily forget the fact that nature is greater than man,`, kor: `수많은 인간이 거대한 도시에서 자연이 인간보다 위대하다는 사실을 너무나 쉽게 잊은 채 살아가야만 하는 오늘날,` },
          { paraId: 0, eng: `that love of nature is more necessary than ever.`, kor: `자연에 대한 사랑은 그 어느 때보다 필요하다.` },
          { paraId: 1, eng: `No doubt it is true that a genius is born, not made.`, kor: `천재는 만들어지는 것이 아니라 태어나는 것이라는 말은 의심할 여지 없는 사실이다.` },
          { paraId: 1, eng: `But while it is a mistake to try and discover reasons for a man being a genius,`, kor: `하지만 어떤 사람이 천재인 이유를 찾아내려 하는 것은 실수일지 몰라도,` },
          { paraId: 1, eng: `it is proper and most interesting to note how his genius has taken on a certain shape and direction as a result of his environment.`, kor: `그의 천재성이 환경의 결과로서 어떻게 특정한 형태와 방향을 갖게 되었는지 주목하는 것은 적절하며 매우 흥미로운 일이다.` },
          { paraId: 2, eng: `To many the movies offered an escape from drab reality into the unreal world of romance,`, kor: `많은 이들에게 영화는 단조로운 현실로부터 로맨스라는 비현실적인 세계로의 탈출구를 제공했다. 그곳은 악은 항상 벌을 받고 선은 항상 보상받으며,` },
          { paraId: 2, eng: `where wickedness was always punished and virtue always rewarded, where all women were beautiful and all men handsome,`, kor: `모든 여성은 아름답고 모든 남성은 잘생겼으며,` },
          { paraId: 2, eng: `where riches brought happiness and poverty contentment, and where all stories had a happy ending.`, kor: `부유함은 행복을 가져다주고 가난함은 만족을 주며, 모든 이야기가 해피엔딩으로 끝나는 곳이었다.` },
          { paraId: 3, eng: `An amusing story is told of Sir Walter Raleigh, who brought tobacco from America to England,`, kor: `아메리카에서 영국으로 담배를 가져온 월터 롤리 경에 관한 재미있는 이야기가 전해진다. 당시` },
          { paraId: 3, eng: `where it had seldom or never been seen before.`, kor: `영국에서 담배는 거의 본 적 없는 물건이었다. 그는 흡연을 즐겼는데, 그의 하인이` },
          { paraId: 3, eng: `He was fond of smoking, and it is reported that the first time his servant saw smoke coming from his master's lips he thought Raleigh was on fire,`, kor: `주인의 입에서 연기가 나오는 것을 처음 보았을 때 롤리 경의 몸에` },
          { paraId: 3, eng: `and poured a bucket of water over him to put the fire out.`, kor: `불이 난 줄 알고 불을 끄기 위해 그에게 양동이째 물을 끼얹었다고 전해진다.` },
          { paraId: 4, eng: `It goes without saying that the most necessary thing in business is capital.`, kor: `사업에서 가장 필요한 것이 자본이라는 점은 말할 것도 없다.` },
          { paraId: 4, eng: `But however big your capital may be, if you employ it in a wrong way, you cannot hope to succeed.`, kor: `하지만 자본이 아무리 클지라도 그것을 잘못된 방식으로 사용한다면 성공을 바랄 수 없다.` },
          { paraId: 4, eng: `Besides, you must know that in doing business credit is almost as important as capital.`, kor: `게다가 사업을 함에 있어 신용이 자본만큼이나 중요하다는 사실을 알아야 한다.` },
          { paraId: 5, eng: `Since you cannot read all the books which you may possess, it is enough to possess only as many books as you can read.`, kor: `가지고 있는 모든 책을 다 읽을 수는 없으므로, 읽을 수 있는 만큼의 책만 소유하는 것으로 충분하다.` },
          { paraId: 5, eng: `You should always read standard authors; and when you long for a change, fall back upon those whom you have read before.`, kor: `항상 모범이 되는 저자들의 글을 읽어야 하며, 기분 전환이 필요할 때는 이전에 읽었던 책들을 다시 꺼내 보아라.` },
          { paraId: 6, eng: `It must be clearly understood that the "fittest" which survive are not necessarily the best or highest on any absolute standard,`, kor: `살아남는 '적자(fittest)'가 어떤 절대적 기준에서 반드시 최선이거나 최고인 것은 아니며,` },
          { paraId: 6, eng: `but simply fittest for the given conditions.`, kor: `단지 주어진 조건에 가장 잘 적응한 존재일 뿐이라는 점을 분명히 이해해야 한다.` },
        ],
        "Day34": [
          { paraId: 0, eng: `A book may be compared to the life of your neighbor.`, kor: `책은 이웃의 삶에 비유될 수 있다.` },
          { paraId: 0, eng: `If it is good, it cannot last too long; if bad, you cannot get rid of it too early.`, kor: `좋은 책이라면 아무리 오래 곁에 두어도 지나치지 않고, 나쁜 책이라면 아무리 빨리 치워버려도 빠르지 않다.` },
          { paraId: 1, eng: `There has come about a situation which is novel in the history of the world.`, kor: `세계 역사상 유례없는 상황이 닥쳤다.` },
          { paraId: 1, eng: `The essence of it is that, for the first time, the six continents of the world really matter to one another.`, kor: `그 핵심은 사상 처음으로 세계의 6대륙이 서로에게 진정으로 중요한 존재가 되었다는 것이다.` },
          { paraId: 1, eng: `For at least a good time to come bad harvest or economic depression in any one of them will affect all the others;`, kor: `적어도 당분간은 어느 한 대륙의 흉작이나 경제 불황이 다른 모든 대륙에 영향을 미칠 것이며,` },
          { paraId: 1, eng: `a war beginning anywhere can soon become a war which is happening everywhere.`, kor: `어디선가 시작된 전쟁은 곧 모든 곳에서 일어나는 전쟁이 될 수 있다.` },
          { paraId: 2, eng: `There is much to support the belief that there is a struggle for existence among ideas,`, kor: `사상들 사이에도 생존 경쟁이 존재하며,` },
          { paraId: 2, eng: `and that those which correspond with the changing conditions of humanity tend to prevail.`, kor: `인류의 변화하는 조건에 부합하는 사상들이 승리하는 경향이 있다는 믿음을 뒷받침할 근거는 많다.` },
          { paraId: 2, eng: `But it does not follow necessarily that the ideas which prevail are better morally,`, kor: `하지만 널리 퍼진 사상이 실패한 사상보다 반드시 도덕적으로` },
          { paraId: 2, eng: `or even truer to the laws of Nature, than those which fail.`, kor: `더 우월하거나 자연의 법칙에 더 부합한다고 볼 수는 없다.` },
          { paraId: 3, eng: `When I reached Paris the taxi driver told me that all the hotels were full,`, kor: `내가 파리에 도착했을 때, 택시 기사는 모든` },
          { paraId: 3, eng: `and that I would have a great deal of difficulty in finding a room,`, kor: `호텔이 꽉 찼으며 외곽으로 나가지 않는 한 방을` },
          { paraId: 3, eng: `unless I went out into the suburbs.`, kor: `구하는 데 큰 어려움을 겪을 것이라고 말했다.` },
          { paraId: 4, eng: `I asked a physician whether he agreed with those of his profession who held the view that salt was unnecessary and even harmful.`, kor: `나는 한 의사에게 소금이 불필요하고 해롭기까지 하다는 견해를 가진 동료 의사들의 의견에 동의하는지 물었다.` },
          { paraId: 4, eng: `He replied with great energy in the negative.`, kor: `그는 매우 강한 어조로 부정하며 대답했다.` },
          { paraId: 4, eng: `He would not admit that the foods we eat contain enough salt required by the human body.`, kor: `그는 우리가 먹는 음식에 인체가 필요로 하는 충분한 양의 소금이 들어 있다는 사실을 인정하려 하지 않았다.` },
          { paraId: 5, eng: `In the course of that letter I told her that I needed a hundred dollars,`, kor: `그 편지를 쓰는 도중에 나는 그녀에게 100달러가 필요하다고 말했고,` },
          { paraId: 5, eng: `and that if she could lend me that sum until I could repay it,`, kor: `만약 내가 갚을 수 있을 때까지 그 금액을 빌려준다면 정말 고맙겠으며,` },
          { paraId: 5, eng: `I would be very much obliged to her, and would tell her afterward what I had wanted it for.`, kor: `나중에 그 돈을 어디에 쓰려 했는지 말해주겠다고 전했다.` },
          { paraId: 6, eng: `One of the most disgraceful features of life in the country, Father often declared, was the general inefficiency and slackness of small village tradesmen.`, kor: `시골 생활의 가장 수치스러운 점 중 하나는 작은` },
          { paraId: 6, eng: `He said he had originally supposed that such men were interested in business,`, kor: `마을 상인들의 전반적인 무능함과 나태함이라고 아버지는 자주 말씀하셨다. 아버지는` },
          { paraId: 6, eng: `and that that was why they had opened their shops and sunk capital in them,`, kor: `원래 그런 사람들이 사업에 관심이 있어서 가게를 열고 자본을` },
          { paraId: 6, eng: `but no, they never used them for anything but gossip and sleep.`, kor: `투자한 것이라고 생각했지만, 실제로는 수다를 떨거나 잠을 자는` },
          { paraId: 6, eng: `They took no interest in civilized ways.`, kor: `용도 외에는 가게를 전혀 활용하지 않았다고 하셨다. 그들은` },
          { paraId: 6, eng: `Hadn't heard of them, probably.`, kor: `문명화된 방식에는 관심이 없었고, 아마 들어본 적도 없었을 것이다.` },
        ],
        "Day35": [
          { paraId: 0, eng: `Recently I became acquainted with an old gentleman of eighty who seemed to look at least twenty years younger.`, kor: `최근에 나는 최소한 20년은 더 젊어 보이는 80세의 노신사를 알게 되었다.` },

          { paraId: 2, eng: `A letter from Sam informed her that he had been unexpectedly fortunate in obtaining the shop.`, kor: `샘에게서 온 편지에는 그가 뜻밖의 행운으로 가게를 얻게 되었다는` },

          { paraId: 3, eng: `The men whom I have seen succeed best in life have always been cheerful and hopeful men,`, kor: `내가 본 인생에서 가장 성공한 사람들은 항상` },

          { paraId: 4, eng: `He pulled the blanket over his shoulders and then over his back and legs and he slept face down on the newspapers with his arms out straight and the palms of his hands up.`, kor: `그는 담배를 어깨 위로, 그리고 등과 다리 위로 끌어당긴 채 신문지 위에 엎드려 잠이 들었다. 팔은 곧게 펴고 손바닥은 위를 향한 채였다.` },
          { paraId: 5, eng: `He had not been a week at school when he grew homesick.`, kor: `학교에 간 지 일주일도 되지 않아 그는 향수병에 걸렸다.` },
          { paraId: 5, eng: `Both his teacher and his friends did all they could, but his grief was too deep to be reasoned away.`, kor: `선생님과 친구들 모두 최선을 다했지만, 그의 슬픔은 너무 깊어서 설득으로 해결될 수 없었다.` },
          { paraId: 6, eng: `What added, no doubt, to my hatred of the beast was the discovering,`, kor: `그 짐승에 대한 내 증오를 더하게 만든 것은 의심할 여지 없이,` },

        "Day36": [
          { paraId: 0, eng: `A good way of ridding yourself of certain kinds of dogmatism is to become aware of opinions held in circles different from your own.`, kor: `독단적인 사고에서 벗어나는 좋은 방법은 자신이 속한 집단과는 다른 집단의 의견을 인지하는 것이다.` },
          { paraId: 0, eng: `If you cannot travel, seek out people with whom you disagree, and read a newspaper belonging to a party that is not yours.`, kor: `여행을 할 수 없다면 자신과 의견이 다른 사람들을 찾아보고, 자신이 지지하지 않는 정당의 신문을 읽어보아라.` },
          { paraId: 1, eng: `The custom of making New Year resolutions may not be popular today.`, kor: `새해 결심을 하는 관습이 오늘날에는 그리 인기 있지 않을 수도 있다.` },
          { paraId: 1, eng: `But in many countries people used to make New Year pledges for the purpose of having a better year or conquering their bad habits.`, kor: `하지만 많은 나라에서 사람들은 더 나은 한 해를 보내거나 나쁜 습관을 고치기 위해 새해 다짐을 하곤 했다.` },
          { paraId: 2, eng: `In spite of the great advance of European culture,`, kor: `유럽 문화의 비약적인 발전에도 불구하고,` },
          { paraId: 2, eng: `there is no reason to think that the African Negro or the Eskimo is less intelligent than dwellers in more temperate lands.`, kor: `아프리카 흑인이나 에스키모인이 온대 지역 거주자들보다 지능이 낮다고 생각할 이유는 전혀 없다.` },
          { paraId: 2, eng: `The Eskimo remains uncivilized because he lacks the materials for making tools, without which civilized life is impossible.`, kor: `에스키모인이 비문명 상태로 남아 있는 것은 도구를 만들 재료가 부족하기 때문이며, 도구 없이는 문명화된 삶이 불가능하기 때문이다.` },
          { paraId: 3, eng: `The best way to read fiction is to mix one's reading,`, kor: `소설을 읽는 가장 좋은 방법은 과거를 희생하여 현재만 편애하지도,` },
          { paraId: 3, eng: `neither to favor the present at the expense of the present nor to favor the past at the expense of the present.`, kor: `현재를 희생하여 과거만 편애하지도 않으면서 독서를 섞어 하는 것이다.` },
          { paraId: 3, eng: `And don't think that if this policy is pursued, contemporary works will appear thin and trivial beside the great works of the past.`, kor: `이런 원칙을 따른다고 해서 현대의 작품들이 과거의 위대한 걸작들 곁에서 초라하고 사소해 보일 것이라 생각하지 마라.` },
          { paraId: 3, eng: `It isn't necessarily so at all.`, kor: `전혀 그럴 필요는 없다.` },
          { paraId: 4, eng: `At the age of sixteen he managed to be allowed to fight a bull on horseback,`, kor: `16세의 나이에 그는 말을 타고 황소와 싸우는 것을 허락받았고,` },
          { paraId: 4, eng: `and to the admiration of the public, killed it with one thrust of his lance.`, kor: `대중의 감탄 속에 창 한 번의 찌르기로 황소를 죽였다.` },
          { paraId: 5, eng: `Dull as a student may be, and difficult as a subject may seem to be at first sight,`, kor: `학생이 비록 둔할지라도,` },
          { paraId: 5, eng: `he will find the study becomes easier or at least less difficult,`, kor: `그리고 과목이 처음에는 아무리 어려워 보일지라도,` },
          { paraId: 5, eng: `if he can persevere and does not neglect it.`, kor: `인내심을 갖고 소홀히 하지 않는다면 공부가 더 쉬워지거나 최소한 덜 어렵게 느껴진다는 것을 알게 될 것이다.` },
          { paraId: 6, eng: `Much as I once loved Thoreau, I confess I have never looked upon money as a cause of enslavement.`, kor: `한때 소로를 무척 좋아했음에도 불구하고, 고백하자면 나는 돈을 노예화의 원인으로 본 적이 한 번도 없다.` },
          { paraId: 6, eng: `I have always felt freer when I had a dollar in my pocket rather than just a quarter.`, kor: `나는 주머니에 25센트만 있을 때보다 1달러가 있을 때 항상 더 자유롭다고 느꼈다.` },
          { paraId: 6, eng: `To be able to take a taxi instead of a bus is to me a desirable kind of freedom.`, kor: `버스 대신 택시를 탈 수 있다는 것은 나에게 바람직한 종류의 자유이다.` },
        ],
        "Day37": [
          { paraId: 0, eng: `If our science were perfect it would represent the essence of the human spirit.`, kor: `만약 우리의 과학이 완벽하다면 그것은 인간 정신의 정수를 대변할 것이다.` },
          { paraId: 0, eng: `Imperfect as it is, it can give us only a few glimpses of the essence, mixed with many more glimpses of the human flesh.`, kor: `과학은 불완전하기에, 인간적인 육신의 모습들과 뒤섞인 정수의 단면들을 아주 조금만 보여줄 뿐이다.` },
          { paraId: 1, eng: `Great physicist as he is, he is still greater as a man.`, kor: `위대한 물리학자임에도 불구하고 그는 인간으로서 더욱 위대하다.` },
          { paraId: 1, eng: `He achieved a fame greater than that of any other scientist,`, kor: `그는 다른 어떤 과학자보다 큰 명성을 얻었지만,` },
          { paraId: 1, eng: `although no other man is as indifferent to fame and as uncomfortable about publicity as he is.`, kor: `그만큼 명성에 무관심하고 대중의 관심을 불편해하는 사람도 없다.` },
          { paraId: 1, eng: `Fame or external circumstances can change him very little.`, kor: `명성이나 외부 환경은 그를 거의 변화시키지 못한다.` },
          { paraId: 2, eng: `A young man who has passed through a course of university training should discipline himself at an early date never to read for mere amusement.`, kor: `대학 교육 과정을 마친 청년은 단지 즐거움을 위해 책을 읽지 않도록 일찍이 스스로를 훈련해야 한다.` },
          { paraId: 2, eng: `And once the habit of the discipline has been formed, he will find it impossible to read for mere amusement.`, kor: `일단 그러한 훈련이 습관이 되면, 단순히 오락만을 위해 독서하는 것이 불가능하다는 것을 깨닫게 될 것이다.` },
          { paraId: 3, eng: `Every man in the world is better than somebody else.`, kor: `세상 모든 사람은 다른 누군가보다는 나은 점이 있다. 내 학생이 부유하든 가난하든,` },
          { paraId: 3, eng: `Whether one of my students is rich or poor, white,`, kor: `인종이 무엇이든,` },
          { paraId: 3, eng: `black or yellow, bright or slow,`, kor: `똑똑하든 더디든 나에게는 중요하지 않다. 그에게 인류애가 있다면,` },
          { paraId: 3, eng: `it is no matter to me if there is humanity in him - if he has a heart - if he loves truth and honor.`, kor: `마음이 있다면, 그리고 진리와 명예를 사랑한다면 그것으로 충분하다.` },
          { paraId: 4, eng: `Men sometimes speak as if the study of the classics would at length make way for more modern and practical studies;`, kor: `사람들은 가끔 고전 연구가 결국 더 현대적이고 실용적인 연구에 자리를 내줄 것처럼` },
          { paraId: 4, eng: `but the adventurous students will always study classics, in whatever language they may be written and however ancient they may be.`, kor: `말한다. 하지만 진취적인 학생들은 고전이 어떤 언어로 쓰였든, 얼마나 오래되었든 상관없이 항상` },
          { paraId: 4, eng: `For what are the classics but the noblest recorded thoughts of man?`, kor: `고전을 공부할 것이다. 고전이란 인류의 가장 숭고한 사상을 기록한 것이 아니면 무엇이겠는가?` },
          { paraId: 5, eng: `A house without books is a mindless and characterless house, no matter how rich the Persian carpets and how elegant the furniture.`, kor: `아무리 값비싼 페르시아 양탄자와 우아한 가구가 있을지라도 책이 없는 집은 정신도 개성도 없는 집이다.` },
          { paraId: 5, eng: `The Persian carpets only tell you that the owner has got money,`, kor: `페르시아 양탄자는 주인이 돈이 있다는 사실만을 알려주지만,` },
          { paraId: 5, eng: `but the books will tell you whether he has got a mind as well.`, kor: `책은 그에게 정신 또한 있는지를 말해준다.` },
          { paraId: 6, eng: `There is no denying (but) that the earth must have been somewhat sweeter in that dewy morning of creation,`, kor: `천지창조의 그 이슬 맺힌 아침,` },
          { paraId: 6, eng: `when it was young and fresh, when the feet of the trampling millions had not trodden its grass to dust.`, kor: `지구가 젊고 신선하며 수많은 사람의 발길이 풀밭을 짓밟아 먼지로 만들기 전에는 분명 지구가 지금보다 훨씬 더 아름답고 감미로웠을 것이라는 점은 부정할 수 없다.` },
        ],
        "Day38": [
          { paraId: 0, eng: `A newspaper is the only kind of reading that is almost universal.`, kor: `신문은 거의 모든 사람이 읽는 유일한 읽을거리다.` },
          { paraId: 0, eng: `No one is so occupied with the business of his calling that he can't find time to read a newspaper.`, kor: `자기 본업에 너무 바빠서 신문 읽을 시간조차 없는 사람은 아무도 없다.` },
          { paraId: 1, eng: `Indeed science is a good thing, but it is not an end in itself;`, kor: `참으로 과학은 좋은 것이지만 그 자체가 목적은 아니다.` },
          { paraId: 1, eng: `it is a means toward an end and that end is human improvement.`, kor: `과학은 목적을 위한 수단이며, 그 목적은 인류의 향상이다.` },
          { paraId: 1, eng: `As scientists keep insisting, there is neither good nor bad in any scientific discovery;`, kor: `과학자들이 계속 주장하듯이 과학적 발견 그 자체에는 선도 악도` },
          { paraId: 1, eng: `it is the use to which it is put which makes it beneficial or dangerous;`, kor: `없다. 그것을 어떻게 사용하느냐가 이로운 것인지 위험한 것인지를` },
          { paraId: 1, eng: `and the decision does not lie with the scientists themselves but with society.`, kor: `결정한다. 그리고 그 결정권은 과학자가 아니라 사회에 있다.` },
          { paraId: 2, eng: `Until now he has been an insignificant member of the school,`, kor: `지금까지 그는 학교에서 존재감 없는 학생이었다. 운동도 공부도` },
          { paraId: 2, eng: `one of those boys who excel neither at games nor at lessons,`, kor: `뛰어나지 않아 아무런 기대도 받지 못하고, 문제를` },
          { paraId: 2, eng: `of whom nothing is expected, and rarely, if ever, get into trouble.`, kor: `일으키는 일도 거의 없는 그런 소년들 중 하나였다.` },
          { paraId: 3, eng: `Mass media have referred so much to the atomic bomb and the possibility that a far more forcible H-bomb will come into use,`, kor: `대중 매체에서 원자폭탄과 훨씬 더 강력한 수소폭탄의 사용 가능성에 대해 너무 많이 언급했기 때문에,` },
          { paraId: 3, eng: `that one is apt to forget what atomic energy can do for our well-being and health by using it properly.`, kor: `사람들은 원자력을 적절히 사용할 때 우리의 복지와 건강을 위해 무엇을 할 수 있는지를 잊기 쉽다.` },
          { paraId: 4, eng: `Photography has been brought to such a degree of perfection that there is scarcely an object in nature that is beyond the reach of the camera.`, kor: `사진 기술은 매우 완벽한 수준에 도달하여 자연계의 사물 중 카메라의 손길이 닿지 않는 대상을 거의 찾아볼 수 없게 되었다.` },
          { paraId: 5, eng: `The world is so made that it probably never happens that a person lives who has not,`, kor: `세상은 자신을 사랑해 주거나 사랑해 주었던 사람이 단 한 명도` },
          { paraId: 5, eng: `or has never had, any one to love him.`, kor: `없는 상태로 살아가는 사람은 아마 존재하지 않도록 만들어져 있다.` },
          { paraId: 5, eng: `There is the love of parents, of brothers and sisters, of relatives and companions.`, kor: `부모님의 사랑, 형제자매의 사랑, 친척과 동료의 사랑이 있기 때문이다.` },
          { paraId: 6, eng: `One of the gifts which many people have but few use to the full is the gift of expression.`, kor: `많은 사람이 가지고 있지만 제대로 활용하는 사람은 드문 재능 중 하나가 표현력이다.` },
          { paraId: 6, eng: `Because you have never tried to write anything other than letters,`, kor: `편지나 학창 시절의 과제물 외에는 글을 써본 적이 없다고` },

        ],
        "Day39": [
          { paraId: 0, eng: `I would like to see children taught that they should not say they like things which they do not like,`, kor: `나는 아이들이 단지 다른 사람들이 좋아한다고 해서 자기가 좋아하지` },
          { paraId: 0, eng: `merely because certain other people say they like them,`, kor: `않는 것을 좋아한다고 말해서는 안 된다는 것과, 아무것도 이해하지 못하면서` },
          { paraId: 0, eng: `and how foolish it is to say they believe this or that when they understand nothing about it.`, kor: `무엇을 믿는다고 말하는 것이 얼마나 어리석은 일인지 배우기를 바란다.` },
          { paraId: 1, eng: `Those men of genius choose a particular profession not because they consider it the best,`, kor: `그 천재들은 특정 직업이 가장 훌륭하거나 영광, 돈,` },

      for(const [day, sentences] of Object.entries(allData)){

        }
      }

    }

    document.getElementById('main-page').style.display = 'block';

async function showDetail(id, title){
  currentChapterId = id;
  document.getElementById('main-page').style.display='none';
  document.getElementById('detail-page').style.display='block';
  document.getElementById('detail-title').textContent = title;
  
  let sents = await getData('sents');
  sents = sents.filter(s => s.chapId === id);
  
  document.getElementById('sentence-list').innerHTML = sents.map(s => `
    <div class="sentence" id="s${s.id}">
      <input type="checkbox" ${s.checked ? 'checked' : ''} onchange="toggleCheck(${s.id}, this.checked)">
      <div>
        <div class="eng">${s.eng}</div>
        <div class="kor">${s.kor}</div>
      </div>
    </div>
  `).join('');
}

async function toggleCheck(id, val){
  const tx = db.transaction('sents', 'readwrite');
  const store = tx.objectStore('sents');
  const s = await new Promise(res => {
    store.get(id).onsuccess = e => res(e.target.result);
  });
  if(s){
    s.checked = val;
    store.put(s);
  }
}

function goBack(){
  stopPlay();
  document.getElementById('detail-page').style.display='none';
  document.getElementById('main-page').style.display='block';
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}

init();
