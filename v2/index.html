    .btn { width: 100%; padding: 18px; border-radius: 12px; border: none; color: #fff; font-size: 17px; font-weight: 700; margin-bottom: 10px; cursor: pointer; transition: opacity 0.2s; }

</head>
<body>
  <div id="loading" style="display:flex; justify-content:center; align-items:center; height:100vh; font-size:20px; color:#8e8e93;">
    불러오는 중...
  </div>
  <div id="main-page" style="display:none;">

<script>
let db, playing = false, wakeLock = null;
let currentChapterId = null;
const synth = window.speechSynthesis;

let bgAudioCtx, bgSource;

function keepAudioAlive() {
  try {
    // 1. 이미 재생 중이면 중복 생성 방지
    if (bgAudioCtx && bgAudioCtx.state === 'running') return;

    bgAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    // 2. iOS는 컨텍스트 생성 후 'suspended' 상태일 때가 많으므로 강제 재개
    if (bgAudioCtx.state === 'suspended') {
      bgAudioCtx.resume();
    }

    const buf = bgAudioCtx.createBuffer(1, bgAudioCtx.sampleRate * 2, bgAudioCtx.sampleRate);
    const ch = buf.getChannelData(0);
    // 무음에 가깝지만 '신호'는 있는 상태로 설정
    for (let i = 0; i < ch.length; i++) ch[i] = 0.00001; 

    bgSource = bgAudioCtx.createBufferSource();
    bgSource.buffer = buf;
    bgSource.loop = true;
    bgSource.connect(bgAudioCtx.destination);
    bgSource.start();
    console.log("Audio Keep-Alive Started");
  } catch(e) {
    console.error("Audio Keep-Alive Failed", e);
  }
}
function unlockAudio() {
  // iOS speechSynthesis 상태 강제 리셋
  synth.cancel();
  synth.resume();
  // 무음 발화로 오디오 엔진 깨우기
  const silent = new SpeechSynthesisUtterance(' ');
  silent.volume = 0;
  silent.rate = 1;
  synth.speak(silent);
}

function stopAudioAlive() {
  try {
    if(bgSource) { bgSource.stop(); bgSource = null; }
    if(bgAudioCtx) { bgAudioCtx.close(); bgAudioCtx = null; }
  } catch(e) {}
}
  
const openDB = () => new Promise((res, rej) => {
  const req = indexedDB.open('InfiniteEnglishDB', 1);
  req.onupgradeneeded = e => {
    const d = e.target.result;
    if (!d.objectStoreNames.contains('chaps')) d.createObjectStore('chaps', {keyPath:'id', autoIncrement:true});
    if (!d.objectStoreNames.contains('sents')) {
      const s = d.createObjectStore('sents', {keyPath:'id', autoIncrement:true});
      s.createIndex('chapId', 'chapId');
    }
  };
  req.onsuccess = () => { db = req.result; res(); };
  req.onerror = () => rej(req.error);
});

const getData = store => new Promise((res, rej) => {
  const tx = db.transaction(store, 'readonly');
  const r = tx.objectStore(store).getAll();
  r.onsuccess = () => res(r.result);
  r.onerror = () => rej(r.error);
});

const addData = (store, obj) => new Promise((res, rej) => {
  const tx = db.transaction(store, 'readwrite');
  const r = tx.objectStore(store).add(obj);
  r.onsuccess = () => res(r.result);
  r.onerror = () => rej(r.error);
});

const putData = (store, obj) => new Promise(res => {
  const tx = db.transaction(store, 'readwrite');
  tx.objectStore(store).put(obj).onsuccess = () => res();
});

async function startPlay(mode) {
  if(playing) stopPlay();
  unlockAudio();
  playing = true;
  keepAudioAlive();  
  
  try { if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen'); } catch(e){}
  
  while(playing) {
    let list = await getData('sents');
    if(mode === 'chapter' && currentChapterId) list = list.filter(s => s.chapId === currentChapterId);
    if(document.getElementById('only-checked').checked) list = list.filter(s => s.checked);
    if(document.getElementById('global-shuffle').checked) list.sort(() => Math.random() - 0.5);
    
    if(list.length === 0) { alert("문장이 없습니다."); stopPlay(); break; }
    
    for(const s of list) {
      if(!playing) break;
      const el = document.getElementById('s' + s.id);
      document.querySelectorAll('.sentence').forEach(i => i.classList.remove('highlight'));
      if(el) {
        el.classList.add('highlight');
        el.scrollIntoView({behavior:'smooth', block:'center'});
      }
      
      const n = +document.getElementById('repeatN').value;
      for(let i=0; i<n; i++) {
        if(!playing) break;
        await new Promise(res => {
          const u = new SpeechSynthesisUtterance(s.eng);
          u.lang = 'en-US';
          u.rate = +document.getElementById('speed').value;
          u.onend = res;
          u.onerror = res;
          synth.speak(u);
        });
        await new Promise(r => setTimeout(r, +document.getElementById('gap').value * 1000));
      }
    }
  }
}

function stopPlay(){
  playing = false;
  synth.cancel();
  stopAudioAlive();
  if(wakeLock) { wakeLock.release().then(() => wakeLock = null); }
  document.querySelectorAll('.highlight').forEach(i => i.classList.remove('highlight'));
}                        // ← stopPlay 함수 여기서 끝

// ← visibilitychange는 이 아래, 함수 바깥에 위치
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') {
    synth.cancel();
    synth.resume();
  }
});

// 페이지 로드 즉시 한 번 리셋
window.addEventListener('pageshow', () => {
  synth.cancel();
  synth.resume();
});

          { paraId: 5, eng: `"How long have you been dumb?" The beggar was taken by surprise and quite forgot that he was 'dumb'.`, kor: `얼마나 되었소?" 거지는 깜짝 놀라 자신이 '벙어리'라는 사실을` },
          { paraId: 5, eng: `He answered quickly: "Oh, ever since I was born, sir."`, kor: `완전히 잊어버렸다. 그는 재빨리 대답했다. "오, 태어날 때부터입니다, 선생님."` },
          { paraId: 6, eng: `I once met a woman who, having been left with a fortune,`, kor: `나는 언젠가 유산을 물려받은 한 여성을 만났는데,` },
          { paraId: 6, eng: `said that she would never feel free till she had gotten rid of her property.`, kor: `그녀는 재산을 처분하기 전까지는 결코 자유를 느끼지 못할 것이라고 말했다.` },
          { paraId: 6, eng: `Possessions, she maintained, made one a slave, and one became their servant and not their master.`, kor: `그녀의 주장에 따르면, 소유물은 사람을 노예로 만들며, 사람은 소유물의 주인이 아니라 하인이 된다는 것이었다.` },
          { paraId: 7, eng: `Worn out by anguish and exertion, I sank into a death-like slumber;`, kor: `고통과 노력으로 기진맥진한 채 나는 죽은 듯한 잠에 빠져들었다.` },
          { paraId: 7, eng: `and it was not until the following morning when the sun rose that I came to my senses.`, kor: `그리고 다음 날 아침 해가 뜨고 나서야 정신이 들었다.` },
        ],
        "Day3": [
          { paraId: 0, eng: `It was not long before we again met by chance.`, kor: `오래지 않아 우리는 우연히 다시 만났다.` },
          { paraId: 0, eng: `We came face to face at a street corner in my neighborhood, and I was struck by a change in him.`, kor: `우리는 내 집 근처 길모퉁이에서 마주쳤고, 나는 그의 변화된 모습에 깜짝 놀랐다.` },
          { paraId: 1, eng: `A silence fell suddenly between us which I somehow expected to be unbroken.`, kor: `우리 사이에 갑자기 정적이 흘렀고, 왠지 나는 그 정적이 깨지지 않기를 기대했다.` },
          { paraId: 1, eng: `But it had not fallen for more than a few seconds when,`, kor: `하지만 정적이 흐른 지 몇 초도 되지 않아,` },
          { paraId: 1, eng: `in the utter stillness, I distinctly heard rapid steps coming nearer and nearer along the street.`, kor: `완전한 고요 속에서 길을 따라 점점 더 가까워지는 빠른 발자국 소리가 또렷하게 들렸다.` },
          { paraId: 2, eng: `I had been taught in my home across the sea that thrift was one of the fundamentals in a successful life.`, kor: `나는 바다 너머 고향에서 검소함이 성공적인 삶의 기본 요소 중 하나라고 배웠다.` },
          { paraId: 2, eng: `My family had come from a land (the Netherlands) noted for its thrift;`, kor: `우리 가족은 검소함으로 유명한 나라인 네덜란드에서 왔다. 그러나 우리가 미국에 온` },
          { paraId: 2, eng: `but we had been in the United States only a few days before the realization came home strongly to my father that they had brought their children to a land of waste.`, kor: `지 불과 며칠 만에, 아버지는 자녀들을 낭비의 땅으로 데려왔다는 사실을 뼈저리게 깨달으셨다.` },
          { paraId: 3, eng: `The more carefully nature has been studied, the more widely has order been found to prevail,`, kor: `자연을 더 주의 깊게 연구할수록 질서가 널리 퍼져 있다는 사실이` },
          { paraId: 3, eng: `while what seemed disorder has proved to be nothing more than complexity;`, kor: `더 많이 발견되었고, 무질서해 보이던 것은 단지 복잡함에 불과하다는` },
          { paraId: 3, eng: `until, at present, no one is so foolish as to believe that anything happens by chance,`, kor: `것이 증명되었다. 그리하여 현재는 어떤 일이 우연히 일어난다거나 원인` },
          { paraId: 3, eng: `or that there are any real accidents which have no cause.`, kor: `없는 진짜 사고가 있다고 믿을 만큼 어리석은 사람은 아무도 없다.` },
          { paraId: 4, eng: `No one will dispute the fact that kindness is a fine virtue.`, kor: `친절이 훌륭한 미덕이라는 사실을 부정할 사람은 아무도 없을 것이다.` },
          { paraId: 4, eng: `To say a person is kind is to say that he is gentle, considerate, and charitable.`, kor: `어떤 사람이 친절하다고 말하는 것은 그가 온화하고, 사려 깊으며, 자비롭다는 것을 의미한다.` },
          { paraId: 4, eng: `He puts the comfort of others before his own convenience.`, kor: `그는 자신의 편의보다 타인의 편안함을 우선시한다.` },
          { paraId: 4, eng: `In looking back over the people we have known and loved,`, kor: `우리가 알고 사랑했던 사람들을 되돌아볼 때,` },
          { paraId: 4, eng: `we can all remember certain men and women who were outstanding for their kindness.`, kor: `우리 모두는 친절함으로 뛰어났던 특정 남녀들을 기억할 수 있다.` },
          { paraId: 5, eng: `It is perhaps true to say that memory is the faculty of poetry, because imagination itself is an exercise of memory.`, kor: `기억이 시의 능력이라고 말하는 것은 아마 사실일 것이다. 왜냐하면 상상력 자체가 기억의 연습이기` },
          { paraId: 5, eng: `There is nothing we imagine which we do not already know.`, kor: `때문이다. 우리가 상상하는 것 중에 이미 알고 있지 않은 것은 없다. 그리고 우리의` },
          { paraId: 5, eng: `And our ability to imagine is our ability to remember what we have already once experienced and to apply it to some different situation.`, kor: `상상력은 우리가 이미 한 번 경험한 것을 기억하여 그것을 다른 상황에 적용하는 능력이다.` },
          { paraId: 6, eng: `Life, to be deep and strong, must be touched and tempered by sadness, as sunlight is sweetest when softened by shadows;`, kor: `삶이 깊고 강해지려면 슬픔에 의해 만져지고 단련되어야 한다. 마치 햇빛이 그림자에 의해 부드러워질 때 가장 달콤하고,` },
          { paraId: 6, eng: `as music, to be melodious, must have a minor chord in it.`, kor: `음악이 선율적이 되려면 단조 화음이 있어야 하는 것과 같다.` },
          { paraId: 7, eng: `Have you never rushed dripping from the bath, or chewing from the table,`, kor: `목욕탕에서 물을 뚝뚝 흘리며 뛰어나오거나, 식탁에서 음식을 씹으며 달려 나오거나,` },
          { paraId: 7, eng: `or dazed from the bed, only to be told that you are a wrong number?`, kor: `침대에서 멍한 상태로 일어났는데, 결국 잘못 걸려온 전화라는 말을 들은 적이 없는가?` },
        ],
        "Day4": [
          { paraId: 0, eng: `Nothing is more pleasant for the members of a household than to gather in front of a roaring fire,`, kor: `가족들에게 타오르는 불 앞에 모여 앉아 특별한 음식과 음료는 말할` },
          { paraId: 0, eng: `entertained by the delights of the company, not to mention the special food and drink.`, kor: `것도 없고 함께 있는 즐거움을 만끽하는 것보다 더 즐거운 일은 없다.` },
          { paraId: 1, eng: `We have only a few more decades to live on this earth,`, kor: `우리는 이 땅에서 살 날이 불과 몇십 년밖에 남지 않았는데도,` },
          { paraId: 1, eng: `and we lose many valuable hours thinking over small things that will soon be forgotten by us and by everybody.`, kor: `우리와 다른 모든 이들에게 곧 잊힐 사소한 것들을 생각하며 소중한 시간을 많이 허비한다.` },
          { paraId: 1, eng: `No, let us devote our life to worthwhile actions, feelings and thoughts.`, kor: `그러지 말고 우리의 삶을 가치 있는 행동과 감정, 생각에 바치자.` },
          { paraId: 1, eng: `For life is too short to be little.`, kor: `인생은 사소해지기에는 너무 짧기 때문이다.` },
          { paraId: 2, eng: `Trifles light as air are to the jealous proofs as strong as holy writ.`, kor: `공기처럼 가벼운 사소한 것들도 질투하는 이에게는 성경 말씀만큼이나 강력한 증거가 된다.` },
          { paraId: 2, eng: `A handkerchief of his wife's seen in Cassio's hand, was motive enough to the deluded Othello to pass sentence of death upon them both,`, kor: `카시오의 손에 들린 아내의 손수건을 본 것은,` },
          { paraId: 2, eng: `without once inquiring how Cassio came by it.`, kor: `현혹된 오셀로가 카시오가 그것을 어떻게 갖게 되었는지 한 번도 묻지 않은 채 그들 둘 모두에게 사형 선고를 내리기에 충분한 동기가 되었다.` },
          { paraId: 3, eng: `Although both love and knowledge are necessary, love is in a sense more fundamental,`, kor: `사랑과 지식 모두가 필요하지만,` },
          { paraId: 3, eng: `since it will lead intelligent people to seek knowledge, in order to find out how to benefit those whom they love.`, kor: `어떤 의미에서 사랑이 더 근본적이다. 왜냐하면 사랑은 지적인 사람들로 하여금 자신이 사랑하는 사람들에게 어떻게 이로움을 줄지 알아내기 위해 지식을 구하도록 이끌기 때문이다.` },
          { paraId: 4, eng: `In a few days our vacation will begin; everybody is joyous and animated at the prospect, because everybody is to go home.`, kor: `며칠 뒤면 방학이 시작된다. 모두가 집에 갈 것이기에 그 기대감으로` },
          { paraId: 4, eng: `I know that I am to stay here during the five days that the holidays last,`, kor: `즐겁고 활기차 있다. 나는 연휴가 지속되는 5일 동안 이곳에` },
          { paraId: 4, eng: `and that I will be very alone during that time.`, kor: `머물러야 한다는 것과 그동안 매우 외로울 것이라는 사실을 알고 있다.` },
          { paraId: 5, eng: `Europeans are not concerned, like Americans, with the question of how a third world war is to be won,`, kor: `유럽인들은 미국인들처럼 제3차 세계대전을 어떻게 승리할 것인가 하는 문제에는 관심이 없고,` },
          { paraId: 5, eng: `but only with the question of how it is to be avoided.`, kor: `오직 그것을 어떻게 피할 것인가 하는 문제에만 관심이 있다.` },
          { paraId: 6, eng: `Besides our primary obligation to God, we are to love our country, and to honor its ruler as representing it.`, kor: `신에 대한 우리의 일차적인 의무 외에도, 우리는 국가를 사랑하고 국가를 대표하는 통치자를 존경해야 한다.` },
          { paraId: 6, eng: `We are to love the brotherhood, that is to say, our fellow Christians.`, kor: `우리는 형제애, 즉 동료 기독교인들을 사랑해야 한다.` },
          { paraId: 6, eng: `And we are to honor all men.`, kor: `그리고 우리는 모든 사람을 존중해야 한다.` },
        ],
        "Day5": [
          { paraId: 0, eng: `The intellectual and social movement which was to dispel the darkness of the Middle Ages and prepare the way for those who would ultimately deliver reason from her prison,`, kor: `중세의 어둠을 떨쳐내고 궁극적으로 감옥에 갇힌 이성을 구해낼` },
          { paraId: 0, eng: `began in Italy in the thirteenth century.`, kor: `사람들을 위해 길을 닦은 지적·사회적 운동은 13세기 이탈리아에서 시작되었다.` },
          { paraId: 1, eng: `Music is a universal language understood by all peoples.`, kor: `음악은 모든 민족이 이해하는 보편적인 언어이다.` },
          { paraId: 1, eng: `This common saying is quite true,`, kor: `이 흔한 말은 아주 사실이지만,` },
          { paraId: 1, eng: `but we must not forget that some experience of music is necessary if a person is to understand it.`, kor: `사람이 음악을 이해하려면 어느 정도의 음악적 경험이 필요하다는 사실을 잊어서는 안 된다.` },
          { paraId: 2, eng: `I would have every student know, and the sooner the better,`, kor: `나는 모든 학생이 언어에 대한 정확한 지식 없이는 고대든 현대든 어떤 나라의 문학이나 문화도 철저히 감상할 수 없다는 사실을,` },
          { paraId: 2, eng: `that there can be no thorough appreciation of the literature or culture of any country ancient or modern without an exact knowledge of the language.`, kor: `빠를수록 좋으니 꼭 알았으면 한다.` },
          { paraId: 3, eng: `She flung the door wide open for him, silently watched him go out,`, kor: `그녀는 그를 위해 문을 활짝 열어주었고,` },
          { paraId: 3, eng: `and not until she heard the front door close behind him did she make a move at all.`, kor: `그가 나가는 것을 묵묵히 지켜보았으며, 현관문이 닫히는 소리를 듣고서야 비로소 움직였다.` },
          { paraId: 3, eng: `But then she threw herself down upon the sofa and burst into tears.`, kor: `그러고 나서 그녀는 소파에 몸을 던지고 울음을 터뜨렸다.` },
          { paraId: 4, eng: `Civilization is a product of adversity.`, kor: `문명은 역경의 산물이다.` },
          { paraId: 4, eng: `The great civilizations of all time seem to have arisen where nature made production possible only a part of the year,`, kor: `역대 위대한 문명들은 자연이 일 년 중 일부 기간에만 생산을 가능하게 하여,` },
          { paraId: 4, eng: `and thus made it necessary for man to work and save up for the time when he could not produce.`, kor: `인간이 생산할 수 없는 시기를 위해 일하고 저축하는 것이 필수적인 곳에서 발생한 것으로 보인다.` },
          { paraId: 4, eng: `Man does not naturally like to work steadily, and if nature enables him to avoid it,`, kor: `인간은 본래 꾸준히 일하는 것을 좋아하지 않으며,` },
          { paraId: 4, eng: `he usually seems content to loaf rather than labor and progress.`, kor: `만약 자연이 그것을 피할 수 있게 해준다면 보통 노동하고 발전하기보다는 빈둥거리는 것에 만족하는 듯하다.` },
          { paraId: 5, eng: `Though to be read is not the motive which impels the author to write,`, kor: `비록 읽히는 것이 작가로 하여금 글을 쓰게 만드는 동기는 아닐지라도(그의 동기는 다른 데 있다),` },
          { paraId: 5, eng: `his motive is other, once he has written his desire is to be read,`, kor: `일단 글을 쓰고 나면 읽히고 싶은 것이 그의 욕망이며,` },
          { paraId: 5, eng: `and in order to achieve that he must do his best to make what he writes readable.`, kor: `그것을 달성하기 위해 그는 자신의 글을 읽기 쉽게 만들기 위해 최선을 다해야 한다.` },
          { paraId: 6, eng: `There was no one in sight but a girl of about twelve,`, kor: `눈을 붕대로 감은 채 한 어린 소년의 인도를 받으며 꽃단` },
          { paraId: 6, eng: `with her eyes covered with a bandage, who was being led carefully between the flowerbeds by a little boy.`, kor: `사이를 조심스럽게 지나가고 있는 12살쯤 된 소녀 외에는 아무도 보이지 않았다.` },
          { paraId: 6, eng: `She stopped, and evidently asked who it was that had come in, and he seemed to be describing me to her.`, kor: `그녀는 멈춰 서서 분명히 누가 들어왔는지 물었고, 소년은 나를 그녀에게 묘사해주고 있는 것 같았다.` },
        ],
        "Day6": [
          { paraId: 0, eng: `A great many things which in times of lesser knowledge we imagined to be superstitious or useless,`, kor: `지식이 부족했던 시절에 우리가 미신적이거나 쓸모없다고 생각했던 아주 많은 것들이,` },
          { paraId: 0, eng: `prove today on examination to have been of immense value to mankind.`, kor: `오늘날 조사 결과 인류에게 엄청난 가치가 있었음이 증명되고 있다. 아마 어떤` },
          { paraId: 0, eng: `Probably no superstition ever existed which did not have some social value;`, kor: `미신도 사회적 가치를 가지지 않은 것은 없었을 것이다. 그리고 겉보기에 가장` },
          { paraId: 0, eng: `and the most seemingly disgusting or cruel sometimes turn out to have been the most precious.`, kor: `혐오스럽거나 잔인해 보이는 것들이 때로는 가장 소중한 것으로 드러나기도 한다.` },
          { paraId: 1, eng: `Sometimes, looking back, one is appalled at one's errors, one seems to have wasted so much time in idle byways,`, kor: `때때로 뒤를 돌아보면 자신의 실수에 소스라치게 놀라게 된다. 무의미한 샛길에서 너무 많은 시간을 허비한 것 같고,` },
          { paraId: 1, eng: `and often to have mistaken the road so completely that whole years appear wasted.`, kor: `종종 길을 완전히 잘못 들어서 수년의 세월이 헛된 것처럼 보이기도 한다.` },
          { paraId: 2, eng: `I intended to have left the party before midnight but had to stay rather late.`, kor: `나는 자정 전에 파티를 떠나려 했으나 꽤 늦게까지 머물러야 했다.` },
          { paraId: 2, eng: `Because if I had left early, it could have ruined the exciting atmosphere.`, kor: `왜냐하면 내가 일찍 떠났더라면 흥겨운 분위기를 망칠 수도 있었기 때문이다.` },
          { paraId: 3, eng: `There is no evidence of prehistoric man having made war,`, kor: `선사 시대 인류가 전쟁을 했다는 증거는 없다. 왜냐하면` },
          { paraId: 3, eng: `for all his stone implements seem to have been designed for hunting,`, kor: `그의 모든 석기 도구들은 사냥, 채굴, 또는 짐승의 가죽을` },
          { paraId: 3, eng: `for digging, or for scraping animal hides;`, kor: `벗기기 위해 고안된 것으로 보이기 때문이다. 또한 설령` },
          { paraId: 3, eng: `and we can be pretty sure that even if he did,`, kor: `전쟁을 했다 하더라도, 수렵 단계에 있던 인간 집단 사이의` },
          { paraId: 3, eng: `any wars between groups in the hunting stage of human life would have been both rare and mild.`, kor: `전쟁은 드물고 온건했을 것이라고 우리는 확신할 수 있다.` },
          { paraId: 4, eng: `She thought her family should all retire to the country for the summer,`, kor: `그녀는 아이들이 산 공기의 혜택을 누릴 수 있도록 온` },
          { paraId: 4, eng: `that the children might have the benefit of the mountain air,`, kor: `가족이 여름 동안 시골로 가서 쉬어야 한다고 생각했다.` },
          { paraId: 4, eng: `for there was no living in the city in this sultry season.`, kor: `이 무더운 계절에 도시에서는 도저히 살 수가 없었기 때문이다.` },
          { paraId: 5, eng: `The discipline should not be excessive —`, kor: `훈육은 과도해서는 안 된다. 우리는 금지 그` },
          { paraId: 5, eng: `we do not want prohibition for prohibition's sake;`, kor: `자체를 위한 금지를 원하지 않는다. 또한 훈육은` },
          { paraId: 5, eng: `and it must not be capricious —`, kor: `변덕스러워서도 안 된다. 어느 날은 금지하고` },
          { paraId: 5, eng: `it is no use forbidding a thing one day and allowing it the next.`, kor: `다음 날은 허용하는 것은 아무런 소용이 없다.` },
          { paraId: 6, eng: `Owing to Mary's face being buried in her hands, she did not notice a form which came quietly onto the porch,`, kor: `메리가 두 손에 얼굴을 묻고 있었기 때문에,` },
          { paraId: 6, eng: `and on seeing her, first moved as if to retreat, then paused and regarded her.`, kor: `그녀는 현관으로 조용히 다가온 형체를 알아차리지 못했다. 그 형체는 그녀를 보고 처음에는 물러나려는 듯 움직이다가,` },
          { paraId: 6, eng: `Mary did not raise her head for some time, and when she looked around her face was wet and her eyes drowned and dim.`, kor: `멈춰 서서 그녀를 바라보았다. 메리는 한동안 머리를 들지 않았고,` },
          { paraId: 6, eng: `"Mr. Smith," she said, "how long have you been here?"`, kor: `고개를 돌렸을 때 그녀의 얼굴은 젖어 있었으며 눈은 눈물에 잠겨 흐릿했다. "스미스 씨, 여기 언제부터 계셨나요?"라고 그녀가 말했다.` },
        ],
        "Day7": [
          { paraId: 0, eng: `To save embarrassment to people still living I have given to the people who play a part in this story names of my own making,`, kor: `아직 살아있는 사람들의 당혹감을 덜어주기 위해,` },
          { paraId: 0, eng: `and I have in other ways taken pains to make sure that no one should recognize them.`, kor: `나는 이 이야기에 등장하는 인물들에게 내가 지어낸 이름을 붙였으며, 그들을 아무도 알아보지 못하도록 다른 여러 방면에서도 세심한 주의를 기울였다.` },
          { paraId: 1, eng: `No one can help influencing others,`, kor: `아무리 타인에게 영향을 주고 싶지 않거나 자신이 무엇을 하는지 의식하지 못한다 하더라도,` },
          { paraId: 1, eng: `however little he may wish to do so or how little he may be conscious of what he is doing.`, kor: `누구도 타인에게 영향을 주는 것을 피할 수는 없다. 누구도 중립적일 수 없다. 선을 행하고 있지 않다면,` },
          { paraId: 1, eng: `None can be neutral; if he is not doing good, he will in some sense be doing harm.`, kor: `어떤 의미에서는 해를 끼치고 있는 것이다.` },
          { paraId: 2, eng: `It goes without saying that when we read the lives of great men we cannot but be struck by the manner in which all kinds of experiences that might in themselves seem to be random,`, kor: `위인들의 전기를 읽을 때,` },
          { paraId: 2, eng: `or even disastrous are made use of in the long run.`, kor: `그 자체로는 무작위적이거나 심지어 재앙처럼 보일 수 있는 온갖 경험들이 결국에는 어떻게 활용되는지를 보며 우리가 감명받지 않을 수 없다는 것은 말할 필요도 없다.` },
          { paraId: 3, eng: `The great inventions of Thomas A. Edison were the fruit of long and painstaking effort.`, kor: `토머스 A. 에디슨의 위대한 발명품들은 길고 고통스러운 노력의 결실이었다. "천재는 1퍼센트의 영감과 99퍼센트의 노력으로 이루어진다"는` },
          { paraId: 3, eng: `"Genius is one percent inspiration and ninety-nine percent perspiration," was the way he explained his success.`, kor: `것이 그가 자신의 성공을 설명하는 방식이었다. 그는 또한 이렇게 말했다. "나는 가치 있는 일을 우연히` },
          { paraId: 3, eng: `He also said: "I never did anything worth doing by accident, nor did any of my inventions come by accident; they came by work."`, kor: `해낸 적이 없으며, 내 발명품 중 어느 것도 우연히 나온 것은 없다. 그것들은 노력의 결과물이다."` },
          { paraId: 4, eng: `She had never enjoyed the game more thoroughly.`, kor: `그녀는 그 경기를 그토록 철저히 즐겨본 적이 없었다.` },
          { paraId: 4, eng: `The thing that mattered was the game itself rather than winning it.`, kor: `중요한 것은 승리보다는 경기 그 자체였다.` },
          { paraId: 4, eng: `Even being beaten did not matter.`, kor: `심지어 패배하는 것조차 중요하지 않았다.` },
          { paraId: 5, eng: `The English people think that there are no other men like themselves, and no other world but England;`, kor: `영국인들은 자신들과 같은 다른 사람들은 없으며 영국 외에 다른 세상은 없다고 생각한다.` },
          { paraId: 5, eng: `they scarcely see a handsome foreigner but they say that he looks like an Englishman;`, kor: `그들은 잘생긴 외국인을 보기만 하면 영국인처럼 생겼다고 말하며, 외국인 앞에 맛있는` },
          { paraId: 5, eng: `and they cannot set any delicious food before a foreigner without asking if such a thing is made in his country.`, kor: `음식을 내놓을 때마다 그 나라에도 이런 것이 있는지 묻지 않고는 못 배긴다.` },
          { paraId: 6, eng: `We live in the kind of world in which there is no possibility of order without concern for the right of others,`, kor: `우리는 타인의 권리에 대한 배려 없이는 질서의 가능성이` },
          { paraId: 6, eng: `which means that there must always be restraints, which means that simple freedom,`, kor: `없는 세상에 살고 있다. 이는 항상 제약이 있어야 함을` },
          { paraId: 6, eng: `far from being a natural right, is obviously irrational.`, kor: `의미하며, 단순한 자유는 천부인권이기는커녕 분명히 비이성적인 것임을 의미한다.` },
        ],
        "Day8": [
          { paraId: 0, eng: `Then I also think of the full-grown gourds, which can be seen on the thatched roofs of the country houses,`, kor: `또한 나는 시골집 초가 지붕 위에서 볼 수 있는 다 자란 박,` },
          { paraId: 0, eng: `the red peppers drying on mats along the road and the delicious apples,`, kor: `길가 멍석 위에서 말라가는 붉은 고추,` },
          { paraId: 0, eng: `pears, persimmons and grapes to be found in abundance in shops both large and small.`, kor: `그리고 크고 작은 가게에서 풍성하게 볼 수 있는 맛있는 사과, 배, 감, 포도를 생각한다.` },
          { paraId: 0, eng: `Then there is the irresistible scent of chestnuts being roasted over charcoal fires on carts along the street.`, kor: `그리고 거리의 수레 위 숯불에서 구워지는 군밤의 거부할 수 없는 향기도 생각난다.` },
          { paraId: 1, eng: `A sad-faced man came into my flower shop early one morning.`, kor: `어느 날 이른 아침, 슬픈 표정의 한 남자가 내 꽃집에 들어왔다.` },
          { paraId: 1, eng: `I was ready to take his order for a funeral piece, but this time I guessed wrong.`, kor: `나는 장례용 꽃 장식 주문을 받을 준비를 했지만, 이번에는 내 추측이 틀렸다.` },
          { paraId: 1, eng: `He wanted a basket of flowers sent to his wife for their wedding anniversary.`, kor: `그는 결혼기념일을 맞아 아내에게 보낼 꽃바구니를 원했다.` },
          { paraId: 1, eng: `"And what day will that be?" I asked.`, kor: `"그날이 언제인가요?"라고 내가 묻자, 그는 침울하게 대답했다.` },
          { paraId: 1, eng: `Glumly he replied, "Yesterday."`, kor: `"어제였습니다."` },
          { paraId: 2, eng: `Having invented machinery, man has become enslaved by it, as he was long ago enslaved by the gods created by his imagination.`, kor: `기계를 발명한 후, 인간은 오래전 자신이 상상력으로 만들어낸 신들에게 노예가 되었던 것처럼 기계의 노예가 되었다.` },
          { paraId: 2, eng: `It is machinery which has allowed women and children to enter the factory and which at the same time has disorganized the family and the home.`, kor: `여성과 아이들이 공장에 들어갈 수 있게 한 것도 기계이며, 동시에 가족과 가정을 해체한 것도 바로 기계이다.` },
          { paraId: 3, eng: `Our senses, by an effect almost mechanical, are passive to the impression of outward objects,`, kor: `우리의 감각은 거의 기계적인 작용에 의해 외부 대상의 인상(그것이` },
          { paraId: 3, eng: `whether agreeable or offensive, but the mind, possessed of a self-directing power,`, kor: `즐겁든 불쾌하든)에 수동적으로 반응하지만, 자기 주도적인 힘을 가진` },
          { paraId: 3, eng: `may turn its attention to whatever it thinks is proper.`, kor: `마음은 스스로 적절하다고 생각하는 무엇으로든 주의를 돌릴 수 있다.` },
          { paraId: 4, eng: `Being stupid and having no imagination, animals often behave far more sensibly than men.`, kor: `동물들은 어리석고 상상력이 없기에 종종 인간보다 훨씬 더 분별 있게 행동한다. 그들은 효율적으로 그리고 본능에 따라 적절한 순간에 옳고 적합한 일을 한다. 배고플 때 먹고,` },
          { paraId: 4, eng: `Efficiently and by instinct they do the right, appropriate thing at the right moment —`, kor: `목마를 때 물을 찾으며, 여유가 있을 때 쉬거나 논다.` },
          { paraId: 4, eng: `eat when they are hungry, look for water when they feel thirsty, rest or play when they have leisure.`, kor: `` },
          { paraId: 5, eng: `Uncontrolled, the forces of nature may be dangerous and destructive, but once mastered, they can be bent to man's will and desire.`, kor: `통제되지 않을 때 자연의 힘은 위험하고 파괴적일 수 있지만, 일단 정복되면 인간의 의지와 욕구에 굴복시킬 수 있다.` },
          { paraId: 5, eng: `Today, for instance, electricity is man's humble servant, performing a thousand tasks with tremendous efficiency.`, kor: `예를 들어 오늘날 전기는 인간의 겸손한 하인이 되어 엄청난 효율성으로 수많은 과업을 수행하고 있다.` },
          { paraId: 6, eng: `In short, we all go through life wearing glasses colored by our own tastes,`, kor: `요컨대, 우리 모두는 각자의 취향, 직업,` },
          { paraId: 6, eng: `our own calling, and our own prejudices, measuring our neighbors by our own standards,`, kor: `편견으로 색칠된 안경을 쓰고 인생을 살아가며,` },
          { paraId: 6, eng: `summing them up according to our own private arithmetic.`, kor: `자신의 기준으로 이웃을 측정하고 자신만의 사적인 산술에 따라 그들을 평가한다. 우리는 객관적이 아니라 주관적으로 본다. 즉,` },
          { paraId: 6, eng: `We see subjectively, not objectively; what we are capable of seeing, not what there is to be seen.`, kor: `실재하는 것이 아니라 우리가 볼 수 있는 것만을 본다.` },
        ],
        "Day9": [
          { paraId: 0, eng: `The first star to come out in the evening is called the Evening Star, but, strictly speaking, it is not a star at all; it is a planet.`, kor: `저녁에 가장 먼저 뜨는 별은 '개밥바라기(금성)'라고 불리지만, 엄밀히 말하면 그것은 전혀 별이 아니라 행성이다.` },
          { paraId: 0, eng: `Planets are different from the stars.`, kor: `행성은 별(항성)과 다르다.` },
          { paraId: 0, eng: `They do not give off any light of their own but shine by reflecting the sunlight that falls on them.`, kor: `행성은 스스로 빛을 내지 않고 자신에게 떨어지는 햇빛을 반사하여 빛난다.` },
          { paraId: 0, eng: `There are nine of these planets traveling around the sun, the earth being one of them.`, kor: `태양 주위를 도는 이런 행성은 9개(명왕성 포함 당시 기준)가 있으며, 지구도 그중 하나이다.` },
          { paraId: 1, eng: `With their minds fixed on the future,`, kor: `미래에 마음을 둔 미국인들은 풍부한 토지와 자원에 둘러싸여` },
          { paraId: 1, eng: `Americans found themselves surrounded with ample land and resources and troubled by a shortage of labor and skill.`, kor: `있으면서도 노동력과 기술 부족으로 어려움을 겪고 있음을 알게 되었다.` },
          { paraId: 1, eng: `They set much value on technical knowledge and inventiveness which would unlock the riches of the country and open the door to a glorious future.`, kor: `그들은 국가의 부를 열고 영광스러운 미래의 문을 열어줄 기술적 지식과 창의성에 큰 가치를 두었다.` },
          { paraId: 2, eng: `A child that always receives sympathy will continue to cry over little troubles;`, kor: `항상 동정을 받는 아이는 사소한 문제에도 계속 울 것이다. 일반적인 성인의 평범한` },
          { paraId: 2, eng: `the ordinary self-control of the average adult is achieved only through knowledge that no sympathy will be won by making a loud complaint.`, kor: `자기 통제는 크게 불평한다고 해서 동정을 얻을 수 없다는 사실을 깨달음으로써만 이루어진다.` },
          { paraId: 3, eng: `God was sorry that Adam and Eve had disobeyed him.`, kor: `신은 아담과 이브가 자신에게 불순종한 것을 슬퍼했다. 죄와` },
          { paraId: 3, eng: `Sin and fear had spoiled the fellowship between them.`, kor: `두려움이 그들 사이의 유대감을 망쳐놓았다. 신은 이브에게` },
          { paraId: 3, eng: `God said to Eve, "Because you listened to the Tempter's voice and disobeyed me,`, kor: `말했다. "네가 유혹자의 목소리를 듣고 내게 불순종했으니,` },
          { paraId: 3, eng: `you shall have pain and trouble all the days of your life."`, kor: `너는 평생 동안 고통과 고난을 겪게 될 것이다."` },
          { paraId: 4, eng: `Man does not live by bread alone, but neither does he live by taking thought alone.`, kor: `인간은 빵만으로 살 수 없지만, 생각만으로 살 수도 없다.` },
          { paraId: 4, eng: `I love to think, and talk and feel, but cannot forget that I have hands which clamor to be put to use,`, kor: `나는 생각하고 말하고 느끼는 것을 좋아하지만,` },
          { paraId: 4, eng: `arms which will not hang idle.`, kor: `사용되기를 갈망하는 손과 한가하게 늘어져 있지 않으려는 팔이 내게 있다는 사실을 잊을 수 없다.` },
          { paraId: 5, eng: `Looking back, I infer that there must have been something in me a little superior to the common run of youths,`, kor: `되돌아보건대, 내게는 일반적인 젊은이들보다 조금은 우월한 무언가가 있었음이 틀림없다고 추론한다.` },
          { paraId: 5, eng: `otherwise the above-mentioned men, so much older than me and higher in academic position,`, kor: `그렇지 않았다면 나보다 훨씬 나이가 많고 학문적 지위가 높은 앞서` },
          { paraId: 5, eng: `would never have allowed me to associate with them.`, kor: `언급된 분들이 결코 나와 어울리는 것을 허락하지 않았을 것이기 때문이다.` },
          { paraId: 6, eng: `The history of mankind is the history of man's activity,`, kor: `인류의 역사는 인간 활동의 역사이며,` },
          { paraId: 6, eng: `and so long as human nature and man's material conditions are what they are,`, kor: `인간의 본성과 물질적 조건이 지금과 같은 한,` },
          { paraId: 6, eng: `so long must economic and industrial factors have a potent influence in our political and social life.`, kor: `경제적·산업적 요인들은 우리의 정치적·사회적 삶에 강력한 영향력을 미칠 수밖에 없다.` },
        ],
        "Day10": [
          { paraId: 0, eng: `You may have heard of that lovely land called Italy, the land of golden sunshine and warm, soft air.`, kor: `황금빛 햇살과 따뜻하고 부드러운 공기의 나라인 이탈리아라는 아름다운 땅에 대해 들어보았을 것이다. 그곳의 하늘은` },
          { paraId: 0, eng: `There the skies are almost always blue — such a wonderfully deep blue, that Italy is often called "The Land of Blue Skies."`, kor: `거의 항상 푸르다. 너무나 경이롭고 짙은 푸른색이라 이탈리아는 종종 '파란 하늘의 나라'라고 불린다.` },
          { paraId: 1, eng: `Language is a living thing.`, kor: `언어는 살아있는 생명체이다.` },
          { paraId: 1, eng: `A word is like a plant or an animal.`, kor: `단어는 식물이나 동물과 같다.` },
          { paraId: 1, eng: `It comes into existence, it grows, changes its form, matures and falls into decay.`, kor: `그것은 생겨나고, 성장하고, 형태가 변하며, 성숙했다가 쇠퇴한다.` },
          { paraId: 1, eng: `Thus the science of language is as interesting and fascinating as Botany or Zoology,`, kor: `따라서 언어학은 식물학이나 동물학만큼이나 흥미롭고 매혹적이며,` },
          { paraId: 1, eng: `and the linguist who studies printed pages may well be compared to the naturalist who hunts the field for his specimens.`, kor: `인쇄된 페이지를 연구하는 언어학자는 표본을 찾아 들판을 누비는 박물학자에 비유될 수 있다.` },
          { paraId: 2, eng: `I have been asked to speak on the question of how to make the best of life,`, kor: `인생을 어떻게 최대한으로 활용할 것인가라는 질문에 대해 강연해달라는 요청을 받았지만,` },
          { paraId: 2, eng: `but may as well confess at once that I know nothing about it.`, kor: `나는 그에 대해 아무것도 모른다고 즉시 고백하는 편이 낫겠다.` },
          { paraId: 2, eng: `I cannot think that I have made the best of my own life,`, kor: `나는 내 인생을 최대한으로 활용했다고 생각할 수 없으며,` },
          { paraId: 2, eng: `nor is it likely that I will make much better of what may or may not remain to me.`, kor: `내게 남아있을지도 모를 시간을 훨씬 더 잘 활용할 것 같지도 않다.` },
          { paraId: 3, eng: `Economic laws can no more be evaded than can gravitation.`, kor: `경제 법칙은 중력만큼이나 피할 수 없는 것이다.` },
          { paraId: 3, eng: `We might as well attempt to reverse the motion of the earth on its axis as attempt to reverse the industrial progress and send men back into the age of homespun.`, kor: `산업 발전을 거꾸로 돌려 인간을 수동 가내공업 시대로 되돌려 보내려는 시도는 지축을 중심으로 도는 지구의 자전을 되돌리려는 시도와 다를 바 없다.` },
          { paraId: 4, eng: `A man should never be ashamed to admit he has been in the wrong,`, kor: `인간은 자신이 틀렸음을 인정하는 것을 결코 부끄러워해서는 안 된다. 그것은` },
          { paraId: 4, eng: `which is but saying in other words that he is wiser today than he was yesterday.`, kor: `다른 말로 하면 그가 어제보다 오늘 더 현명해졌다는 뜻일 뿐이기 때문이다.` },
          { paraId: 5, eng: `It is one of the most tragic facts in the recent development of science that the conquest of the air,`, kor: `모든 면에서 세계의 통합과 인류의 화합을 위해 작용했어야 할` },
          { paraId: 5, eng: `which on all grounds should have worked towards the unification of the world and the harmony of mankind,`, kor: `공중 정복(항공 기술의 발달)이 실제로는 우리의 가장 위협적인 위험이 되었다는` },
          { paraId: 5, eng: `has actually become our most threatening danger.`, kor: `사실은 최근 과학 발전의 가장 비극적인 사실 중 하나이다.` },
          { paraId: 6, eng: `I was gazing at the swans floating on the lake with happy thoughts in my mind,`, kor: `행복한 생각에 잠겨 호수에 떠 있는 백조들을 바라보고 있었는데,` },
          { paraId: 6, eng: `when who should touch me on the elbow but the little girl whom I had mentioned!`, kor: `다름 아닌 내가 언급했던 그 어린 소녀가 내 팔꿈치를 건드리는 것이 아닌가!` },
        ],
        "Day11": [
          { paraId: 0, eng: `I know that a fairly good income is very important;`, kor: `꽤 괜찮은 수입이 매우 중요하다는 것은 알고 있다.` },
          { paraId: 0, eng: `but it is still more important that a man should follow the vocation for which he is best fitted,`, kor: `하지만 보수가 좋든 싫든 간에 사람이 자신에게` },
          { paraId: 0, eng: `whether it happens to be well paid or not.`, kor: `가장 적합한 직업을 갖는 것이 훨씬 더 중요하다.` },
          { paraId: 1, eng: `Those Americans whom I most honor, and who were the founders of their country, never accepted money for their service.`, kor: `내가 가장 존경하는 미국인들이자 그 나라의 건국자들은 봉사의 대가로 결코 돈을 받지 않았다.` },
          { paraId: 1, eng: `Washington would accept no salary as commander-in-chief for seven years, nor as president for eight years.`, kor: `워싱턴은 7년 동안 총사령관으로서, 그리고 8년 동안 대통령으로서 급료를 전혀 받지 않았다.` },
          { paraId: 2, eng: `In gazing at a mountain range from a distance, the peaks seem to rise clear against the sky.`, kor: `멀리서 산맥을 바라보면 봉우리들이 하늘을 배경으로 선명하게 솟아 있는 것처럼 보인다.` },
          { paraId: 2, eng: `There seem to be no obstacles to hinder him who would climb to the top.`, kor: `꼭대기에 오르려는 사람을 방해할 장애물은 없는 것처럼 보인다.` },
          { paraId: 2, eng: `What seemed so simple at a distance grows infinitely complex as you draw nearer.`, kor: `멀리서 보기에 그렇게 단순해 보였던 것이 가까이 다가갈수록 무한히 복잡해진다.` },
          { paraId: 2, eng: `So is it with life.`, kor: `인생도 그러하다.` },
          { paraId: 3, eng: `With every passing day his health improved.`, kor: `하루하루가 지날수록 그의 건강은 좋아졌다. "아," 그는 나에게 외치곤 했다. "섬` },
          { paraId: 3, eng: `"Ah," he would exclaim to me, "island life has charms not to be found everywhere!`, kor: `생활에는 어디서나 찾을 수 없는 매력이 있어요! 인류 질병의 절반은 의사나 약` },
          { paraId: 3, eng: `Half the ills of mankind might be shaken off without doctor or medicine by mere residence in this lovely portion of the world."`, kor: `없이도 이 아름다운 세상 한구석에 사는 것만으로 떨쳐낼 수 있을 겁니다."` },
          { paraId: 4, eng: `With all my faults I have a warm heart;`, kor: `많은 결점에도 불구하고 나는 따뜻한 마음을 가지고 있다. 비록 가난하지만,` },
          { paraId: 4, eng: `and poor as I am, I would rather deny myself the necessities of life than do an ungenerous thing.`, kor: `나는 너그럽지 못한 일을 하느니 차라리 생활 필수품조차 포기하겠다.` },
          { paraId: 5, eng: `The milkman has a rival in early calling, and that rival is the newspaper boy.`, kor: `우유 배달부에게는 아침 일찍 방문하는 경쟁자가 있는데,` },
          { paraId: 5, eng: `Both milk and news are required for breakfast and the London businessman would as soon do without the one as the other,`, kor: `바로 신문 배달 소년이다. 아침 식사에는 우유와 뉴스 둘 다 필요하며,` },
          { paraId: 5, eng: `the first being for his bodily refreshment and the second for his mental.`, kor: `런던의 사업가는 우유 없이 못 지내는 것만큼이나 신문 없이도 못 지낼 것이다. 전자는 육체적 활력을 위한 것이고 후자는 정신적 활력을 위한 것이기 때문이다.` },
          { paraId: 6, eng: `Her anger never lasted long, and, having humbly confessed her fault, she sincerely repented and tried to do better.`, kor: `그녀의 분노는 결코 오래가지 않았으며, 자신의 잘못을 겸허히 고백한 후에는 진심으로 뉘우치고 더 잘하려고 노력했다.` },
          { paraId: 6, eng: `Her sisters used to say that they rather liked to get Jo into a fury, because she was such an angel afterwards.`, kor: `그녀의 자매들은 조를 화나게 만드는 것을 오히려 좋아한다고 말하곤 했는데, 그 이유는 화가 풀린 뒤의 그녀가 그야말로 천사 같았기 때문이다.` },
        ],
        "Day12": [
          { paraId: 0, eng: `The air of that island was so genial and balmy that we could have slept quite well without any shelter;`, kor: `그 섬의 공기는 너무나 온화하고 향기로워 우리는 아무런 대피소 없이도` },
          { paraId: 0, eng: `but we were so little used to sleeping in the open air,`, kor: `충분히 잘 수 있었을 것이다. 하지만 우리는 야외에서 자는 것에 너무나` },
          { paraId: 0, eng: `that we did not quite relish the idea of lying down without any covering over us.`, kor: `익숙하지 않아서, 아무런 덮개 없이 눕는다는 생각을 별로 즐기지 않았다.` },
          { paraId: 1, eng: `Modern man, enclosed by four walls and chained to an indoor job, realizes that he is shortening his days.`, kor: `사방이 벽으로 막힌 실내 업무에 매여 사는 현대인은 자신이 수명을 단축시키고 있다는 사실을` },
          { paraId: 1, eng: `He needs exercise, and he knows it;`, kor: `깨닫는다. 그는 운동이 필요하다는 것을 알고 있다. 하지만 그가 지침을 구하려 하면 너무나 상충되는` },
          { paraId: 1, eng: `but when he asks for guidance he receives so much conflicting advice that he is afraid to accept any of it lest he should make bad matters worse.`, kor: `조언을 많이 받게 되어, 상황을 더 악화시킬까 두려워 그중 어떤 것도 받아들이지 못한다.` },
          { paraId: 2, eng: `We should always put aside something, so that, in the event of our being unable to work due to unemployment,`, kor: `우리는 실직, 질병,` },
          { paraId: 2, eng: `sickness, or old age, we may not starve nor be compelled to ask charity from others.`, kor: `또는 노령으로 인해 일을 할 수 없게 될 경우에 대비하여 항상 무언가를 저축해 두어야 한다. 그래야 굶주리지 않고 타인에게 자선을 구걸하지 않아도 된다.` },
          { paraId: 3, eng: `He was looking at the dog, afraid to approach him, for fear the animal should show his teeth, were it only from habit;`, kor: `그는 개가 단지 습관 때문이라도 이빨을 드러낼까 두려워 다가가지 못한 채 바라보고 있었고,` },
          { paraId: 3, eng: `and equally afraid to run away, lest he should be thought a coward.`, kor: `동시에 겁쟁이로 여겨질까 두려워 도망가지도 못한 채 서 있었다.` },
          { paraId: 4, eng: `The lower animals must have their bodily structure modified in order to survive under greatly changed conditions.`, kor: `하등 동물들은 크게 변화된 환경에서 살아남기 위해 신체 구조를 변화시켜야 한다.` },
          { paraId: 4, eng: `They must be rendered stronger, or acquire more effective teeth or claws, for defense against new enemies;`, kor: `새로운 적들로부터 방어하기 위해 더 강해지거나 더 효과적인 이빨이나 발톱을 갖춰야 하며,` },
          { paraId: 4, eng: `or, they must be reduced in size, so as to escape detection and danger.`, kor: `아니면 발각되지 않고 위험을 피하기 위해 몸집을 줄여야 한다.` },
          { paraId: 5, eng: `By and by I was told by someone that birds could not be caught by putting salt on their tails,`, kor: `머지않아 나는 누군가로부터 새 꼬리에 소금을 뿌린다고 해서 새를 잡을 수 있는` },
          { paraId: 5, eng: `that I was being made a fool of, and this was a great shock to me,`, kor: `것이 아니며 내가 바보 취급을 당했다는 말을 들었다. 거짓말을 하는 것이 사악한` },
          { paraId: 5, eng: `since I had been taught to believe that it was wicked to tell a lie.`, kor: `것이라고 배워온 나에게 이것은 큰 충격이었다. 이제 내 평생 처음으로, 거짓말에도 여러` },
          { paraId: 5, eng: `Now for the first time in my life I discovered that there were lies and lies, or untruths that were not lies.`, kor: `종류가 있다는 것, 즉 거짓말이 아닌 사실이 아닌 것들이 있다는 사실을 발견했다.` },
          { paraId: 6, eng: `Let wealth be regarded by some society of the future as a mere means to the proper ends of human life,`, kor: `미래의 어떤 사회가 부를 인간 삶의 정당한 목적을 위한 단순한 수단으로 간주하게 된다면,` },
          { paraId: 6, eng: `and whether it is rich or poor on the whole,`, kor: `그 사회가 전반적으로 부유하든 가난하든 부는 공정하게 분배될 것이며,` },
          { paraId: 6, eng: `its wealth will be fairly distributed, and that society in pursuit of those ends will be happy and healthy.`, kor: `그러한 목적을 추구하는 사회는 행복하고 건강해질 것이다.` },
        ],
        "Day13": [
          { paraId: 0, eng: `The picnic-park was reached at last.`, kor: `마침내 소풍 장소인 공원에 도착했다.` },
          { paraId: 0, eng: `Lunch boxes were quickly opened and the contents were not long in disappearing.`, kor: `도시락 가방이 재빨리 열렸고 그 내용물은 얼마 지나지 않아 사라졌다.` },
          { paraId: 0, eng: `Those mothers who felt sure in the morning that too much lunch was being packed up,`, kor: `아침에 도시락을 너무 많이 싸는 것 같다고 확신했던 어머니들은 그` },
          { paraId: 0, eng: `should have been there to see what happened to those sandwiches and cakes.`, kor: `샌드위치와 케이크에 무슨 일이 일어났는지 보기 위해 그곳에 있었어야 했다.` },
          { paraId: 0, eng: `Every bit of food was eaten, and it was quite likely that if as much more had been brought,`, kor: `모든 음식이 남김없이 먹혔고,` },
          { paraId: 0, eng: `it would have gone the same way.`, kor: `아마 그만큼의 음식을 더 가져왔더라도 똑같이 다 사라졌을 것이다.` },
          { paraId: 1, eng: `People in high positions are of course more thought of and talked about,`, kor: `높은 자리에 있는 사람들은 당연히 미천한 일상 업무를 하며 살아가는` },
          { paraId: 1, eng: `and have their virtues more praised, than those whose lives are passed in humble everyday work,`, kor: `사람들보다 더 많이 회자되고 그들의 미덕이 더 칭송받는다. 하지만 분별력` },
          { paraId: 1, eng: `but every sensible man knows how necessary that humble everyday work is,`, kor: `있는 사람이라면 누구나 그 미천한 일상 업무가 얼마나 필요한지, 그리고` },
          { paraId: 1, eng: `and how important it is to us that it should be done well.`, kor: `그 일이 잘 수행되는 것이 우리에게 얼마나 중요한지 알고 있다.` },
          { paraId: 2, eng: `A man was run over by a car in High Street yesterday.`, kor: `어제 하이 스트리트에서 한 남자가 차에 치였다.` },
          { paraId: 2, eng: `The car was driven by Mr. White.`, kor: `그 차는 화이트 씨가 운전하고 있었다.` },
          { paraId: 2, eng: `An ambulance was called, and the man was taken to the nearest hospital.`, kor: `구급차가 출동하여 남자는 가까운 병원으로 이송되었다.` },
          { paraId: 2, eng: `The injured man has not been identified yet.`, kor: `부상당한 남자의 신원은 아직 확인되지 않았다.` },
          { paraId: 2, eng: `He was dressed in a brown coat and grey pants.`, kor: `그는 갈색 코트와 회색 바지를 입고 있었다.` },
          { paraId: 2, eng: `His age is estimated to be about thirty-five.`, kor: `나이는 약 35세로 추정된다.` },
          { paraId: 2, eng: `Anyone who may know this man is asked to telephone the police.`, kor: `이 남자를 아는 분은 경찰에 전화해 주시기 바란다.` },
          { paraId: 3, eng: `Wellington is said to have chosen his officers by their noses and chins.`, kor: `웰링턴 장군은 코와 턱을 보고 장교들을 뽑았다고 전해진다.` },
          { paraId: 3, eng: `The standard for them in noses must have been rather high,`, kor: `공작(웰링턴)의 초상화로 미루어 볼 때 코에 대한 기준은 꽤 높았을 것이 틀림없지만,` },
          { paraId: 3, eng: `to judge by the portraits of the Duke, but no doubt he made allowances.`, kor: `의심할 바 없이 그는 참작을 해주었을 것이다.` },
          { paraId: 3, eng: `Anyhow, by this method he got the men he wanted.`, kor: `어쨌든 이 방법을 통해 그는 자신이 원하는 사람들을 얻었다.` },
          { paraId: 4, eng: `And about noon word came through that Bones's slave ship had been sighted near the island.`, kor: `그리고 정오 무렵 본즈의 노예선이 섬 근처에서 발견되었다는 소식이 전해졌다.` },
          { paraId: 4, eng: `Great care must be taken, the message said, because the slave ship was in all readiness to sail at a moment's notice.`, kor: `노예선이 즉시 출항할 준비를 완전히 갖추고 있으니 각별히 주의해야 한다고 전갈은 전했다.` },
          { paraId: 4, eng: `All the sailors were warned to keep very quiet, so that the navy ship could sneak up on the slaver unawares.`, kor: `해군 함정이 노예선에 몰래 다가갈 수 있도록 모든 선원에게 매우 조용히 하라는 경고가 내려졌다.` },
          { paraId: 5, eng: `Instead of having everything done for him, the child should be allowed to do things by himself;`, kor: `아이를 위해 모든 것을 다 해주는 대신 아이가 스스로 일을` },
          { paraId: 5, eng: `instead of having all his decisions made for him,`, kor: `하게 해야 한다. 아이의 모든 결정을 대신 내려주는 대신` },
          { paraId: 5, eng: `he should be given an opportunity to make his own decisions and encouraged to think for himself.`, kor: `아이 스스로 결정할 기회를 주어야 하며 스스로 생각하도록 장려해야 한다.` },
          { paraId: 6, eng: `While there are judges who will decide fairly, and courts in which every man can get justice done to him,`, kor: `공정하게 판결할 판사들이 있고 모든 이가 정의를 실현할 수 있는 법정이 존재하는 한,` },
          { paraId: 6, eng: `the country is safe from all the danger and discontent which always spring up where there is no justice.`, kor: `국가는 정의가 없는 곳에서 항상 발생하는 모든 위험과 불만으로부터 안전하다.` },
        ],
        "Day14": [
          { paraId: 0, eng: `When people live in a community they cannot do exactly as they please.`, kor: `사람들이 공동체 속에서 살 때 그들은 자신이 원하는 대로만 할 수는 없다.` },
          { paraId: 0, eng: `Motorists, for example, cannot drive wherever they like without creating disorder;`, kor: `예를 들어 운전자는 무질서를 초래하지 않고서는 자신이 원하는 곳은 어디든 마음대로` },
          { paraId: 0, eng: `neither can men kill nor rob whomever they please without causing society to collapse.`, kor: `운전할 수 없다. 또한 사람들은 사회를 붕괴시키지 않고서는 자신이 원하는 누구든 죽이거나` },
          { paraId: 0, eng: `If men were not thus restricted, if they had, in name,`, kor: `강도질할 수 없다. 만약 인간이 이처럼 제한되지 않고 명목상으로만 자신이 원하는` },
          { paraId: 0, eng: `the liberty to do what they liked, they would, in fact, have very little liberty.`, kor: `것을 할 자유를 가진다면, 사실상 그들은 아주 적은 자유만을 갖게 될 것이다.` },
          { paraId: 1, eng: `When she had gone Macbeth looked with horror at his red hands.`, kor: `그녀가 가버린 후 맥베스는 자신의 붉은 손을 공포에 질려 바라보았다.` },
          { paraId: 1, eng: `"Will all the water in the ocean wash this blood from my hands?" he muttered, and, after a pause, sadly answered his own question.`, kor: `"대양의 모든 물이 내 손에서 이 피를 씻어낼 수 있을까?" 그는 중얼거렸고, 잠시 멈춘 뒤 슬프게 자문자답했다.` },
          { paraId: 1, eng: `"No, if I were to wash in the ocean my hands would turn the whole sea red."`, kor: `"아니, 내가 대양에서 씻으려 한다면 내 손은 온 바다를 붉게 물들일 것이다."` },
          { paraId: 2, eng: `He knows now that there are, in the air he breathes every day,`, kor: `그는 이제 자신이 매일 마시는 공기 중에 아무리 귀를` },
          { paraId: 2, eng: `sounds that his ears cannot discern, listen as he may,`, kor: `기울여도 귀가 식별할 수 없는 소리가 있고, 아무리 눈을` },
          { paraId: 2, eng: `and lights that his eyes cannot distinguish, strain them as he may.`, kor: `부릅떠도 눈이 구별할 수 없는 빛이 있다는 것을 안다.` },
          { paraId: 3, eng: `The young Newton proved to be totally inadequate at farming.`, kor: `젊은 뉴턴은 농사일에 전혀 적합하지 않다는 것이 드러났다.` },
          { paraId: 3, eng: `Instead of paying attention to his duties, he would read or daydream or make wooden models.`, kor: `자기 의무에 주의를 기울이는 대신, 그는 책을 읽거나 공상에 잠기거나 나무 모형을 만들곤 했다.` },
          { paraId: 3, eng: `His mother at last agreed that Isaac be prepared to enter college.`, kor: `그의 어머니는 마침내 아이작이 대학에 들어갈 준비를 하는 데 동의했다.` },
          { paraId: 4, eng: `You want for a friend someone whom you would like to have with you in trouble,`, kor: `당신은 즐거운 때뿐만 아니라 혹시라도 어려움에 처했을` },
          { paraId: 4, eng: `should you meet it, as well as in sport;`, kor: `때 곁에 두고 싶은 사람을 친구로 원한다.` },
          { paraId: 4, eng: `such a one is one who has your respect.`, kor: `그런 사람은 바로 당신의 존경을 받는 사람이다.` },
          { paraId: 5, eng: `Even had he possessed the poetic faculty, of which, as far as we can judge,`, kor: `설령 그에게 시적 재능이 있었다 하더라도—우리가 판단하기에 그는 그것이 전혀` },
          { paraId: 5, eng: `he was utterly destitute, the want of a language would have prevented him from being a great poet.`, kor: `없었지만—언어의 부족이 그가 위대한 시인이 되는 것을 가로막았을 것이다.` },
          { paraId: 6, eng: `Man would have remained a savage, but for the results of the useful labors of those who preceded him.`, kor: `앞서간 사람들의 유용한 노동의 결과가 없었더라면 인간은 야만인으로 남아 있었을 것이다.` },
          { paraId: 6, eng: `They discovered art and science, and we succeed to the useful effects of their labors.`, kor: `그들은 예술과 과학을 발견했고, 우리는 그들 노동의 유용한 결과물들을 물려받았다.` },
        ],
        "Day15": [
          { paraId: 0, eng: `If it were not for books, for the written record of man's most profound thoughts,`, kor: `만약 책,` },
          { paraId: 0, eng: `his loftiest achievements, each generation would have to rediscover by itself the truths of the past,`, kor: `즉 인간의 가장 깊은 사상과 고귀한 업적에 대한 기록이 없다면,` },
          { paraId: 0, eng: `with only the inadequate help of oral tradition.`, kor: `각 세대는 구전이라는 불충분한 도움에만 의존하여 과거의 진리들을 스스로 다시 발견해야 할 것이다.` },
          { paraId: 1, eng: `Above all, make your study a habit, like getting dressed or undressed,`, kor: `무엇보다도 공부를 옷을 입고 벗는 것, 머리를 빗거나 양치질을` },
          { paraId: 1, eng: `combing your hair or brushing your teeth,`, kor: `하는 것처럼 습관으로 만들어라. 그러면 공부는 삶의 일부가` },
          { paraId: 1, eng: `and it will become so much a part of your life that you will feel guilty if you skip a single time.`, kor: `되어 단 한 번이라도 거르면 죄책감을 느끼게 될 것이다.` },
          { paraId: 2, eng: `Say all you have to say in the fewest possible words, or your reader will be sure to skip them;`, kor: `할 말을 가능한 한 가장 적은 단어로 하라. 그렇지 않으면 독자는 분명히 그것들을 건너뛸` },
          { paraId: 2, eng: `and in the plainest possible words, or he will certainly misunderstand them.`, kor: `것이다. 또한 가능한 한 가장 평이한 단어로 말하라. 그렇지 않으면 독자는 분명히 오해할 것이다.` },
          { paraId: 3, eng: `If all mankind minus one were of one opinion, and only one person were of the contrary opinion,`, kor: `단 한 사람을 제외한 모든 인류가 동일한 의견이고 오직 한 사람만이 반대` },
          { paraId: 3, eng: `mankind would be no more justified in silencing that one person,`, kor: `의견을 가지고 있다 하더라도, 인류가 그 한 사람을 침묵시키는 것은—그 한 사람이 권력을` },
          { paraId: 3, eng: `than he, if he had the power, would be justified in silencing mankind.`, kor: `가졌을 때 인류를 침묵시키는 것이 정당화될 수 없는 것과 마찬가지로—정당화될 수 없다.` },
          { paraId: 4, eng: `It was the custom in those barbarous times that wherever the king slept,`, kor: `그 야만적인 시대에는 왕이 어디서 자든 밤사이에 누군가에게 공격받을 경우에 대비해` },
          { paraId: 4, eng: `two armed men slept in the same chamber in order to defend his person in case he should be attacked by anyone during the night.`, kor: `왕을 보호하기 위해 무장한 두 남자가 같은 방에서 자는 것이 관습이었다.` },
          { paraId: 5, eng: `Granted that your principle is right, I think that the means to the end is the question.`, kor: `당신의 원칙이 옳다는 것은 인정하지만, 목적을 위한 수단이 문제라고 생각한다.` },
          { paraId: 5, eng: `Therefore, I suggest that the plan should be postponed for the time being.`, kor: `그러므로 그 계획은 당분간 연기되어야 한다고 제안하는 바이다.` },
          { paraId: 6, eng: `The selfish boy is one who loves himself solely, and nobody else.`, kor: `이기적인 소년은 오직 자기 자신만을 사랑하고 그 외에는 아무도 사랑하지 않는 아이이다.` },
          { paraId: 6, eng: `He does not care whom he deprives of enjoyment, provided that he can obtain it.`, kor: `그는 자신이 즐거움을 얻을 수만 있다면 누구의 즐거움을 빼앗든 상관하지 않는다.` },
        ],
        "Day16": [
          { paraId: 0, eng: `Supposing you are in one of the London parks, and there happens to be a bird singing,`, kor: `당신이 런던의 어느 공원에 있고 마침 새 한 마리가 노래하고 있어서 그 노래를 즐기기 위해` },
          { paraId: 0, eng: `and you stop to enjoy the song, the fact that some one else stops to enjoy it does not diminish your pleasure, it increases it;`, kor: `멈춰 섰다고 가정해 보자. 다른 누군가가 그것을 즐기기 위해 멈춰 선다는 사실은 당신의 즐거움을 감소시키는` },
          { paraId: 0, eng: `but if some one throws a stone at the bird, he destroys your pleasure.`, kor: `것이 아니라 오히려 증가시킨다. 하지만 누군가 그 새에게 돌을 던진다면 그는 당신의 즐거움을 파괴하는 것이다.` },
          { paraId: 1, eng: `Unless your college education leads you to continue learning all through your life,`, kor: `대학 교육이 평생 동안 배움을 지속하도록 이끌지 못한다면,` },
          { paraId: 1, eng: `it will have failed to play its part to develop you as an individual.`, kor: `그것은 개인으로서 당신을 발전시키는 역할을 다하는 데 실패한 것이 될 것이다.` },
          { paraId: 2, eng: `As a weapon of collective bargaining in a trade dispute,`, kor: `노동 쟁의에서 단체 교섭의 수단으로서 파업 그 자체는 노동조합에 의해` },
          { paraId: 2, eng: `a strike in itself is not now illegal, on condition that preliminary notice of the dispute has been given by the workers' trade union.`, kor: `쟁의에 대한 사전 통고가 이루어졌다는 조건 하에 이제는 불법이 아니다.` },
          { paraId: 3, eng: `Not long ago, I had a chance to watch a surgeon perform a delicate brain operation.`, kor: `얼마 전, 나는 외과의사가 정교한 뇌 수술을 하는 것을 지켜볼 기회가 있었다.` },
          { paraId: 3, eng: `A slight slip of his hand would have meant instant death for the patient.`, kor: `손이 조금만 미끄러져도 환자에게는 즉각적인 죽음을 의미했을 것이다.` },
          { paraId: 3, eng: `What impressed me about the doctor was not his skill but his amazing calmness.`, kor: `의사에 대해 깊은 인상을 준 것은 그의 기술이 아니라 그의 놀라운 침착함이었다.` },
          { paraId: 4, eng: `There are people who have a talent for writing, just as there are people who are born with a gift for music or painting.`, kor: `음악이나 그림에 재능을 타고난 사람들이 있듯이, 글쓰기에 재능이 있는 사람들도 있다.` },
          { paraId: 4, eng: `It is fortunate that we are not all from the same mold, otherwise life would be very monotonous.`, kor: `우리가 모두 같은 틀에서 나오지 않은 것은 다행스러운 일이며, 그렇지 않았다면 인생은 매우 단조로웠을 것이다.` },
          { paraId: 5, eng: `"Please" is a very little word, but it makes a good many requests sound pleasant that without it would sound harsh, as with "Thank you".`, kor: `부탁합니다(Please)는 아주 작은 말이지만, 그 말이 없다면 거칠게 들릴 수 있는 수많은 요청을 즐겁게 들리게 만든다. "감사합니다(Thank you)"라는 말도 마찬가지다.` },
          { paraId: 6, eng: `Let me utter one practical word in conclusion — take care of your health.`, kor: `결론으로 실질적인 조언 한마디를 하겠다. 건강을 돌보라. 이 점에 현명하게` },
          { paraId: 6, eng: `There have been men who by wise attention to this point might have risen to any eminence,`, kor: `주의를 기울였다면 어떤 높은 지위에도 오를 수 있었을 사람들이,` },
          { paraId: 6, eng: `but by unwise neglect of this point have come to nothing.`, kor: `이를 어리석게 소홀히 함으로써 아무것도 이루지 못한 사례들이 있어 왔다.` },
        ],
        "Day17": [
          { paraId: 0, eng: `There was nobody near when he found the gold, and he could have kept it all to himself.`, kor: `그가 금을 발견했을 때 근처에는 아무도 없었고, 그는 그것을 모두 독차지할 수도 있었다.` },
          { paraId: 0, eng: `Such a heap of gold would have made him a rich man, but he did not think of being rich.`, kor: `그런 금더미는 그를 부자로 만들어 주었겠지만, 그는 부자가 될 생각은 하지 않았다.` },
          { paraId: 0, eng: `He thought of being honest.`, kor: `그는 정직해지는 것을 생각했다.` },
          { paraId: 1, eng: `You may have heard grown-ups say,`, kor: `어른들이 "학교에서 그걸 배웠더라면 좋았을 텐데"라거나 "교육을 더 받았더라면 좋았을 텐데"라고` },
          { paraId: 1, eng: `"I wish I had learned that in school," or "I wish I had more education." Why do you suppose they feel that way?`, kor: `말하는 것을 들어본 적이 있을 것이다. 그들이 왜 그렇게 느낀다고 생각하는가?` },
          { paraId: 1, eng: `Perhaps it's because they think life might be more interesting,`, kor: `아마 조금만 더 배웠거나 조금만 더 잘 배웠더라면 인생이 더` },
          { paraId: 1, eng: `or they might have had better jobs, if they had learned just a little more or had learned a little better.`, kor: `흥미로웠을 것이라고, 혹은 더 좋은 직장을 가졌을 것이라고 생각하기 때문일 것이다.` },
          { paraId: 2, eng: `The workman who drops his tools at the stroke of twelve,`, kor: `12시 종이 울리자마자 마치 번개에 맞은 듯 갑자기` },
          { paraId: 2, eng: `as suddenly as if he had been struck by lightning, may be doing his duty —`, kor: `도구를 내려놓는 일꾼은 자신의 의무를 다하고 있는 것일지는 모르나,` },
          { paraId: 2, eng: `but he is doing nothing more.`, kor: `그 이상의 일은 아무것도 하고 있지 않는 것이다.` },
          { paraId: 2, eng: `No man has made a great success of his life by doing merely his duty.`, kor: `단지 의무만을 행함으로써 삶에서 큰 성공을 거둔 사람은 없다.` },
          { paraId: 2, eng: `He must do that — and more.`, kor: `그는 의무를 다해야 하며, 그 이상의 것도 해야 한다.` },
          { paraId: 2, eng: `If he puts love into his work, the "more" will be easy.`, kor: `일에 애정을 쏟는다면 그 "그 이상의 것"은 쉬워질 것이다.` },
          { paraId: 3, eng: `It was a sharp sword and it was hung by only a single horsehair.`, kor: `그것은 날카로운 칼이었고 단 한 가닥의 말총에 매달려 있었다.` },
          { paraId: 3, eng: `What if the hair should break?`, kor: `만약 그 털이 끊어진다면 어찌 되겠는가?` },
          { paraId: 3, eng: `There was danger every moment that it would do so.`, kor: `매 순간 그렇게 될 위험이 도사리고 있었다.` },
          { paraId: 4, eng: `You had better be alone than in mean company.`, kor: `비굴한(또는 저속한) 무리와 함께하느니 차라리 혼자 있는 것이 낫다. 동료를 당신과 같거나` },
          { paraId: 4, eng: `Let your companions be such as yourself or superior; for the worth of a man will always be measured by that of his company.`, kor: `당신보다 나은 사람들로 택하라. 인간의 가치는 항상 그가 사귀는 동료의 가치로 측정되기 때문이다.` },
          { paraId: 5, eng: `I am a perfect enthusiast in my admiration of nature;`, kor: `나는 자연을 찬미하는 데 있어 완전한 열광자이다. 나는 이 나라가` },
          { paraId: 5, eng: `and I have looked upon, and as it were conversed with,`, kor: `내 시야에 선사한 대상들을 아주 오랫동안 그리고 큰 즐거움으로 바라보았고` },
          { paraId: 5, eng: `the objects which this country has presented to my views so long, and with such pleasure,`, kor: `말하자면 그것들과 대화해 왔다. 그래서 그것들과 헤어진다는 생각은 사랑하는` },
          { paraId: 5, eng: `that the idea of parting from them oppresses me with a sadness similar to what I have always felt in quitting a beloved friend.`, kor: `친구를 떠날 때 항상 느꼈던 것과 비슷한 슬픔으로 나를 짓누른다.` },
          { paraId: 6, eng: `Many people, if not most, look on literary taste as an elegant accomplishment,`, kor: `대부분은 아니더라도 많은 사람들이 문학적 취향을 우아한 소양으로 간주한다. 그것을` },
          { paraId: 6, eng: `by acquiring which they will complete themselves, and make themselves finally fit as members of correct society.`, kor: `습득함으로써 자신을 완성하고 마침내 올바른 사회의 구성원으로서 적합해질 것이라고 생각하는 것이다.` },
        ],
        "Day18": [
          { paraId: 0, eng: `Napoleon was rarely, if ever, deceived in regard to a man's actual ability, whether the other had demonstrated his ability or not.`, kor: `나폴레옹은 상대방이 능력을 입증했든 안 했든 간에, 사람의 실제 능력에 관해서는 속는 일이 거의 없었다(혹은 설령 있다 하더라도 드물었다).` },
          { paraId: 1, eng: `People divide off vice and virtue as though they were two things, neither of which had with it anything of the other.`, kor: `사람들은 마치 악과 선이 서로 아무런 공통점이 없는 두 가지인 것처럼 나누곤 한다.` },
          { paraId: 1, eng: `This is not so.`, kor: `그러나 사실은 그렇지 않다.` },
          { paraId: 1, eng: `There is no useful virtue which has not some alloy of vice,`, kor: `약간의 악이 섞여 있지 않은 유용한 선은 없으며,` },
          { paraId: 1, eng: `and hardly any vice, if any, which carries not with it a little dash of virtue.`, kor: `설령 있다 하더라도 약간의 선이 가미되어 있지 않은 악은 거의 없다.` },
          { paraId: 2, eng: `Though the French are little, if at all, inferior to the English in either boating or sailing,`, kor: `프랑스인들이 보트 타기나 항해에서 영국인들에게 뒤처지는 점이 거의 없다 하더라도(설령 있다 해도 아주 조금이다),` },
          { paraId: 2, eng: `their tastes for these two pursuits are extremely limited.`, kor: `이 두 가지 활동에 대한 그들의 취향은 극히 제한적이다.` },
          { paraId: 3, eng: `There are two virtues much needed in modern life, if it is ever to become sweet.`, kor: `현대인의 삶이 즐거워지려면 매우 필요한 두 가지 미덕이 있다.` },
          { paraId: 3, eng: `These virtues are honesty, and simplicity of life,`, kor: `그 미덕은 정직과 삶의 소박함이며,` },
          { paraId: 3, eng: `and it must be noted that the practice of either of these virtues will make the other easier to us.`, kor: `이 중 어느 하나를 실천하는 것이 다른 하나를 더 쉽게 만들어 준다는 점에 주목해야 한다.` },
          { paraId: 4, eng: `In a scientific inquiry, a fallacy, great or small, is always of importance,`, kor: `과학적 탐구에서 크고 작은 오류는 항상 중요하며,` },
          { paraId: 4, eng: `and is sure to be in the long run constantly productive of mischievous, if not fatal, results.`, kor: `결국에는 치명적이지는 않더라도 해로운 결과를 지속적으로 낳게 마련이다.` },
          { paraId: 5, eng: `The dog ordinarily remains loyal to a considerate master.`, kor: `개는 보통 사려 깊은 주인에게 충성을 다한다.` },
          { paraId: 5, eng: `Class distinctions between people have no part in a dog's life.`, kor: `사람들 사이의 계급 차이는 개의 삶에 아무런 영향을 주지 않는다.` },
          { paraId: 5, eng: `It can be a faithful companion to either rich or poor.`, kor: `개는 부자에게든 가난한 자에게든 충실한 동반자가 될 수 있다.` },
          { paraId: 5, eng: `Dogs have endeared themselves to many over the years.`, kor: `개는 수년 동안 많은 사람에게 사랑받아 왔다.` },
          { paraId: 6, eng: `It is not easy to be a patriot these days — not because it is difficult to love one's country.`, kor: `요즘 애국자가 되는 것은 쉽지 않다.` },
          { paraId: 6, eng: `The difficulty lies in loving one's country the right way.`, kor: `나라를 사랑하는 것이 어렵기 때문이 아니라, 나라를 올바른 방식으로 사랑하는 것이 어렵기 때문이다.` },
        ],
        "Day19": [
          { paraId: 0, eng: `Here I was in contact with what I most wanted, life in the raw.`, kor: `여기서 나는 내가 가장 원했던 것, 즉 가공되지 않은` },
          { paraId: 0, eng: `In those three years I must have witnessed pretty well every emotion of which man is capable.`, kor: `날것 그대로의 삶과 접촉했다. 그 3년 동안 나는 인간이` },
          { paraId: 0, eng: `It appealed to my dramatic instinct.`, kor: `느낄 수 있는 거의 모든 감정을 목격했음이 틀림없다. 그것은` },
          { paraId: 0, eng: `It excited the novelist in me.`, kor: `나의 극적인 본능에 호소했고, 내 안의 소설가적 기질을 자극했다.` },
          { paraId: 1, eng: `Teach your children to worship God by doing some useful work, to live honestly and cheerfully, and love their country with an unselfish love.`, kor: `아이들에게 유용한 일을 함으로써 신을 숭배하고, 정직하고 즐겁게 살며, 사심 없는 마음으로 나라를 사랑하도록 가르치라.` },
          { paraId: 1, eng: `Although they may not all become Washingtons, they will surely be such men as will choose a Washington to be their ruler and leader.`, kor: `비록 그들이 모두 워싱턴과 같은 인물이 되지는 못할지라도, 분명 워싱턴 같은 사람을 통치자이자 지도자로 선택할 줄 아는 사람이 될 것이다.` },
          { paraId: 2, eng: `Few peoples have been more discussed than the English.`, kor: `영국인만큼 많이 논의된 민족도 드물다. 수 세기 동안 인류` },
          { paraId: 2, eng: `In the history of human society for several centuries England has been among the principal world energies:`, kor: `사회의 역사에서 영국은 주요한 세계적 동력 중 하나였다. 영국인들은` },
          { paraId: 2, eng: `Englishmen have often, and in a variety of fields, been either leaders or valuable contributors of noteworthy progress.`, kor: `종종 다양한 분야에서 지도자였거나 주목할 만한 발전의 소중한 공헌자였다.` },
          { paraId: 3, eng: `I heartily wish that in my youth I had had someone of good sense to direct my reading.`, kor: `어린 시절에 내 독서를 지도해 줄 식견 있는 누군가가 있었더라면 하고 진심으로 바란다.` },
          { paraId: 3, eng: `I sigh when I reflect on the amount of time I have wasted on books that were of no great profit to me.`, kor: `나에게 큰 도움이 되지 않는 책들에 허비한 시간을 생각하면 한숨이 나온다.` },
          { paraId: 4, eng: `One who has overcome one difficulty is ready to meet the next with confidence.`, kor: `한 가지 어려움을 극복한 사람은 자신감을 가지고 다음 어려움에 맞설 준비가 되어 있다.` },
          { paraId: 4, eng: `See how much such a person has gained.`, kor: `그런 사람이 얼마나 많은 것을 얻었는지 보라.` },
          { paraId: 4, eng: `In later life, while others are hesitating what to do, or whether to do anything, he accomplishes what he undertakes.`, kor: `훗날 다른 사람들이 무엇을 할지, 혹은 아무것도 하지 말지 망설이고 있을 때, 그는 자신이 맡은 일을 완수해낸다.` },
          { paraId: 5, eng: `There are many people who believe themselves to be fundamentally humane and actually behave as humanitarians,`, kor: `자신이 근본적으로 인도주의적이라고 믿고 실제로 인도주의자처럼 행동하는` },
          { paraId: 5, eng: `but who, if changed circumstances offered occasions for being cruel,`, kor: `사람들이 많지만, 상황이 바뀌어 잔인해질 기회가` },
          { paraId: 5, eng: `would give way to the temptation with enthusiasm.`, kor: `생긴다면 열광적으로 그 유혹에 굴복할 사람들도 많다.` },
          { paraId: 5, eng: `Hence the vital necessity of avoiding war, whether international or civil.`, kor: `따라서 국제전이든 내전이든 전쟁을 피하는 것이 절실히 필요하다.` },
          { paraId: 6, eng: `When I was a boy, I knew an old gentleman who used to say the most ferocious things about his landlady behind her back,`, kor: `어렸을 때 나는 등 뒤에서는 집주인 아주머니에 대해 아주 험악한 말을 늘어놓으면서도,` },
          { paraId: 6, eng: `but who was all smiles and obeisance as soon as she came into the room.`, kor: `그녀가 방에 들어오자마자 온화한 미소를 지으며 깍듯이 대하던 한 노신사를 알고 지냈다.` },
        ],
        "Day20": [
          { paraId: 0, eng: `Seated in his family armchair, and looking around him like the sun of the solar system,`, kor: `가문의 안락의자에 앉아 태양계의 태양처럼 주위를 둘러보며 모든 이의` },
          { paraId: 0, eng: `beaming warmth and gladness to every heart, the old gentleman was hospitality itself.`, kor: `마음에 따스함과 기쁨을 비추는 그 노신사는 후덕함 그 자체였다.` },
          { paraId: 1, eng: `Her musical talent kept her in touch with a certain number of artistic people,`, kor: `그녀의 음악적 재능 덕분에 그녀는 상당수의 예술가들과 교류할 수 있었고,` },
          { paraId: 1, eng: `and I enjoyed listening to her play and going to the theater,`, kor: `나는 그녀의 연주를 듣거나 그녀와 함께 극장,` },
          { paraId: 1, eng: `concerts and the opera with her.`, kor: `콘서트, 오페라에 가는 것을 즐겼다.` },
          { paraId: 2, eng: `A glance at the map is sufficient to explain how it was that Greece became civilized before the other European lands.`, kor: `지도를 한 번 보는 것만으로도 그리스가 어떻게 다른 유럽 국가들보다 먼저 문명화되었는지 충분히 설명된다.` },
          { paraId: 2, eng: `It is nearest to those countries in which civilization first arose.`, kor: `그리스는 문명이 처음 발생한 국가들과 가장 가깝다.` },
          { paraId: 2, eng: `It is the border line of the East and West.`, kor: `그곳은 동양과 서양의 경계선이다.` },
          { paraId: 3, eng: `Luck or the grace of Heaven may seem to take part in many happenings in life,`, kor: `인생의 많은 일에 운이나 하늘의 은총이 작용하는 것처럼 보일 수도 있지만,` },
          { paraId: 3, eng: `but a little deeper looking into the causes of them reveals that one's own efforts were by far more responsible for them than most people imagine.`, kor: `그 원인을 조금 더 깊이 들여다보면 대부분의 사람이 상상하는 것보다 본인의 노력이 훨씬 더 큰 원인이었음을 알게 된다.` },
          { paraId: 4, eng: `Many years ago I was thrown by accident among a company of Englishmen who,`, kor: `수년 전 나는 우연히 영국인 일행 속에 섞이게 되었는데,` },
          { paraId: 4, eng: `when they were all together, never talked about anything worth talking about.`, kor: `그들은 다 함께 있을 때 가치 있는 이야기는 전혀 하지 않았다.` },
          { paraId: 4, eng: `I concluded, as young men so easily conclude, that these twenty or thirty gentlemen had not half a dozen ideas among them.`, kor: `나는 젊은이들이 흔히 그렇듯, 이 2, 30명의 신사들에게는 대여섯 가지의 생각조차 없다고 결론지었다.` },
          { paraId: 4, eng: `A little reflection might have reminded me that my own talk was no better than theirs.`, kor: `조금만 반성해 보았더라면 내 대화 역시 그들의 것보다 나을 게 없다는 사실을 깨달았을 것이다.` },
          { paraId: 5, eng: `If my life's journey is to be along an easy road to success, I will have no objection;`, kor: `내 인생의 여정이 성공으로 가는 쉬운 길이라면 반대하지` },
          { paraId: 5, eng: `if, however, it is to be along a hard one,`, kor: `않겠다. 그러나 만약 힘든 길이라면, 아무리 험난할지라도` },
          { paraId: 5, eng: `let it be ever so rough, I will make it smooth and gain my object nevertheless.`, kor: `나는 그것을 평탄하게 만들어 결국 목적을 달성할 것이다.` },
          { paraId: 6, eng: `Nature's way in fashion is exactly opposite to Mankind's.`, kor: `패션에 있어서 자연의 방식은 인류와 정반대이다.` },
          { paraId: 6, eng: `In summer she wears her heaviest clothing, but in winter she goes naked.`, kor: `여름에 자연은 가장 두꺼운 옷을 입지만, 겨울에는 발가벗고 지낸다.` },
        ],
        "Day21": [
          { paraId: 0, eng: `It is a matter of general agreement that the war has had an undesirable effect upon those little everyday manners that sweeten the general air.`, kor: `전쟁이 분위기를 부드럽게 만드는 사소한 일상의 예절들에 바람직하지 못한 영향을 미쳤다는 것은 일반적인 공통의 의견이다.` },
          { paraId: 0, eng: `We must restore them if we are to make life pleasant and tolerable for each other.`, kor: `서로를 위해 삶을 즐겁고 견딜 만하게 만들려면 우리는 그러한 예절들을 회복해야 한다.` },
          { paraId: 1, eng: `Three months later he was able to announce with certainty that rabies, one of the worst diseases known to mankind, was at last conquered.`, kor: `석 달 후, 그는 인류에게 알려진 가장 끔찍한 질병 중 하나인 광견병이 마침내 정복되었다고 확실히 발표할 수 있었다.` },
          { paraId: 1, eng: `This piece of good news soon traveled around the world and added greatly to the reputation of the young scientist.`, kor: `이 기쁜 소식은 곧 전 세계로 퍼져 나갔고 그 젊은 과학자의 명성을 크게 높여 주었다.` },
          { paraId: 2, eng: `For such actions as are prejudicial to the interests of others,`, kor: `타인의 이익을 침해하는 행위에 대해서 개인은 책임을` },
          { paraId: 2, eng: `the individual is accountable, and may be subject to either social or legal punishment,`, kor: `져야 하며, 사회가 보호를 위해 필요하다고 판단한다면` },
          { paraId: 2, eng: `if society is of opinion that the one or the other is requisite for its protection.`, kor: `사회적 혹은 법적 처벌을 받을 수 있다.` },
          { paraId: 3, eng: `If by his vices or follies a person does no direct harm to others,`, kor: `비록 어떤 사람이 자신의 악덕이나 어리석음으로 타인에게 직접적인 해를 끼치지 않는다 하더라도,` },
          { paraId: 3, eng: `he is nevertheless (it may be said) injurious by his example,`, kor: `그는 본보기가 됨으로써 해를 끼치는 것이라 할 수 있으며,` },
          { paraId: 3, eng: `and ought to be compelled to control himself for the sake of those whom the sight or knowledge of his conduct might corrupt or mislead.`, kor: `그의 행동을 보고 알게 됨으로써 타락하거나 잘못된 길로 빠질 수 있는 사람들을 위해 스스로를 통제하도록 강요받아야 마땅하다.` },
          { paraId: 4, eng: `We had met at college; and though there was not much liking between us, nor even much intimacy,`, kor: `우리는 대학에서 만났다. 서로 많이 좋아하거나 친밀하지는 않았지만,` },
          { paraId: 4, eng: `we were so nearly of a humor that we could get along with ease.`, kor: `기질이 매우 비슷해서 큰 어려움 없이 잘 지낼 수 있었다.` },
          { paraId: 5, eng: `Livingstone was a mere skeleton of a man, his clothes in rags, when he returned to civilization.`, kor: `리빙스턴이 문명 세계로 돌아왔을 때 그는 거의 해골처럼 말라 있었고 옷은 누더기였다.` },
          { paraId: 5, eng: `Only the most wonderful courage and perseverance could have carried him through.`, kor: `오직 경이로운 용기와 인내심만이 그를 버티게 했을 것이다.` },
          { paraId: 5, eng: `After having spent sixteen years in Africa, he sailed for England.`, kor: `아프리카에서 16년을 보낸 후, 그는 영국으로 향하는 배를 탔다.` },
          { paraId: 6, eng: `Many times a day I realize how much my outer and inner life is built upon the labors of my fellow men,`, kor: `나는 하루에도 몇 번씩 나의 외적·내적 삶이 살아있는 이들과 죽은 이들 모두의 노동 위에 얼마나 많이 세워져 있는지,` },
          { paraId: 6, eng: `both living and dead, and how earnestly I must exert myself in order to give in return as much as I have received.`, kor: `그리고 내가 받은 만큼 돌려주기 위해 얼마나 진심으로 노력해야 하는지 깨닫는다.` },
          { paraId: 6, eng: `My peace of mind is often troubled by the depressing sense that I have borrowed too heavily from the work of other men.`, kor: `다른 이들의 노고에 너무 많이 빚지고 있다는 우울한 생각에 마음의 평화가 자주 흔들리곤 한다.` },
        ],
        "Day22": [
          { paraId: 0, eng: `Mother held me by the hand and we were kneeling by the bedside of my brother,`, kor: `어머니는 내 손을 잡고 계셨고,` },
          { paraId: 0, eng: `two years older than I, who lay dead, and the tears were flowing down her cheeks unchecked, and she was moaning.`, kor: `우리는 죽어 누워 있는 나보다 두 살 많은 형의 침대 곁에 무릎을 꿇고 있었다. 어머니의 뺨에는 눈물이 쉼 없이 흘러내렸고 그녀는 신음하고 계셨다. 그 소리 없는 고통의 표시는 나에게 매우 강렬한 인상을 남겼으며,` },
          { paraId: 0, eng: `That dumb sign of anguish made upon me a very strong impression which holds its place still with her picture.`, kor: `여전히 그녀의 모습과 함께 내 마음속에 자리 잡고 있다.` },
          { paraId: 1, eng: `Man is a rational animal, so at least I have been told.`, kor: `인간은 이성적인 동물이라고 적어도 나는 들어왔다.` },
          { paraId: 1, eng: `Throughout a long life, I have looked diligently for evidence in favor of this statement,`, kor: `긴 세월 동안 나는 이 주장을 뒷받침할` },
          { paraId: 1, eng: `but so far I have not had the fortune to come across it,`, kor: `증거를 부지런히 찾아왔지만, 3개 대륙에 걸친 여러 나라를` },
          { paraId: 1, eng: `though I have searched in many countries spread over three continents.`, kor: `뒤졌음에도 지금까지 그것을 발견하는 행운을 누리지 못했다.` },
          { paraId: 1, eng: `On the contrary, I have seen the world plunging continually further into madness.`, kor: `반대로, 나는 세상이 끊임없이 광기 속으로 더 깊이 빠져드는 것을 보아왔다.` },
          { paraId: 2, eng: `With most men the knowledge that they must ultimately die doesn't weaken the pleasure in being alive at present.`, kor: `대부분의 사람에게 자신이 결국 죽어야 한다는 사실이 현재 살아있는 즐거움을 약화시키지는 않는다.` },
          { paraId: 2, eng: `To the poet the world appears still more beautiful as he gazes at flowers that are doomed to wither,`, kor: `시인에게 세상은 시들 수밖에 없는 꽃들과 너무나 빨리` },
          { paraId: 2, eng: `at spring that comes to too speedy an end.`, kor: `끝나버리는 봄을 바라볼 때 더욱 아름답게 보인다.` },
          { paraId: 3, eng: `As for me, having some money in my pocket, I traveled to London by land;`, kor: `나로 말하자면,` },
          { paraId: 3, eng: `and there, as well as on the road, had many struggles with myself,`, kor: `주머니에 약간의 돈을 가지고 육로로 런던까지 여행했다. 그곳에서뿐만 아니라 길 위에서도 나는 어떤 인생의 행로를 택해야 할지,` },
          { paraId: 3, eng: `what course of life I should take, and whether I should go home, or go to sea.`, kor: `집으로 돌아가야 할지 아니면 바다로 나가야 할지를 두고 내면에서 수많은 갈등을 겪었다.` },
          { paraId: 4, eng: `Today, if a man were to know something about everything,`, kor: `오늘날 만약 어떤 사람이 모든 것에 대해 조금씩이라도 알고자 한다면,` },
          { paraId: 4, eng: `the allotment of time would give one minute to each subject,`, kor: `시간 배분상 각 주제에 단 1분밖에 할애할 수 없을 것이고,` },
          { paraId: 4, eng: `and he would flit from topic to topic as a butterfly from flower to flower.`, kor: `그는 나비가 꽃 사이를 날아다니듯 이 주제 저 주제로 옮겨 다닐 것이다.` },
          { paraId: 4, eng: `Today commercial, literary, or inventive success means concentration.`, kor: `오늘날 상업적, 문학적, 혹은 창의적 성공은 집중을 의미한다.` },
          { paraId: 5, eng: `As one grows older one becomes more silent.`, kor: `나이가 들수록 사람은 더 과묵해진다. 젊은 시절에는 자신을 세상에 쏟아부을` },
          { paraId: 5, eng: `In one's youth one is ready to pour oneself out to the world;`, kor: `준비가 되어 있다. 타인과 강렬한 유대감을 느끼고, 그들의 품에` },
          { paraId: 5, eng: `one feels an intense fellowship with other people, one wants to throw oneself in their arms and one feels that they will receive one;`, kor: `자신을 던지고 싶어 하며 그들이 자신을 받아줄 것이라고 느낀다. 타인의` },
          { paraId: 5, eng: `one wants to penetrate into them;`, kor: `내면으로 침투하고 싶어 하며, 강물이 바다에서 하나가 되듯 자신의` },
          { paraId: 5, eng: `one's life seems to overflow into the lives of others and become one with theirs as the waters of rivers become one in the sea.`, kor: `삶이 타인의 삶 속으로 흘러 넘쳐 하나가 되는 것처럼 느낀다.` },
          { paraId: 6, eng: `Those who have read everything are thought to understand everything too; but it is not always so.`, kor: `모든 것을 읽은 사람이 모든 것을 이해한다고 생각되기도 하지만,` },
          { paraId: 6, eng: `Reading furnishes the mind only with materials of knowledge; it is thinking that makes what we read ours.`, kor: `항상 그런 것은 아니다. 독서는 마음에 지식의 재료만을 제공할 뿐이다. 우리가 읽은 것을 우리 것으로 만드는 것은 바로 생각(사고)이다.` },
        ],
        "Day23": [
          { paraId: 0, eng: `Letters in themselves are not language, but merely symbols which are used for the sounds of which language is composed.`, kor: `문자 그 자체는 언어가 아니며, 단지 언어를 구성하는 소리를 나타내기 위해 사용되는 기호일 뿐이다.` },
          { paraId: 0, eng: `There is no life or meaning in written symbols by themselves.`, kor: `쓰인 기호 그 자체에는 생명도 의미도 없다.` },
          { paraId: 1, eng: `When we went there they had no sense of sin at all.`, kor: `우리가 그곳에 갔을 때 그들에게는 죄의식이 전혀 없었다.` },
          { paraId: 1, eng: `They broke the commandments one after the other and never knew they were doing wrong.`, kor: `그들은 계명을 하나하나 어기면서도 자신들이 잘못하고 있다는 것을 전혀 알지 못했다.` },
          { paraId: 1, eng: `And I think that was the most difficult part of my work, to instill into the natives the sense of sin.`, kor: `그래서 원주민들에게 죄의식을 심어주는 것이 내 일에서 가장 어려운 부분이었다고 생각한다.` },
          { paraId: 2, eng: `I used to judge the worth of a person by his intellectual power and attainment.`, kor: `나는 사람의 가치를 그의 지적 능력과 성취로 판단하곤 했다.` },
          { paraId: 2, eng: `I could see no good where there was no logic, no charm where there was no learning.`, kor: `논리가 없는 곳에서는 선함을 볼 수 없었고, 학식이 없는 곳에서는 매력을 느낄 수 없었다.` },
          { paraId: 2, eng: `Now I think that one has to distinguish between the two forms of intelligence,`, kor: `이제 나는 지능에는 두 가지 형태,` },
          { paraId: 2, eng: `that of the brain, and that of the heart, and I have come to regard the second as by far the more important.`, kor: `즉 머리의 지능과 가슴의 지능이 있다는 것을 구별해야 한다고 생각하며, 후자를 훨씬 더 중요하게 여기게 되었다.` },
          { paraId: 3, eng: `His opinion may be summarized like this.`, kor: `그의 의견은 이렇게 요약될 수 있다. 권력욕은 허영심과` },
          { paraId: 3, eng: `Love of power, like vanity, is a strong element in normal human nature, and as such is to be accepted;`, kor: `마찬가지로 정상적인 인간 본성의 강력한 요소이며, 그` },
          { paraId: 3, eng: `it becomes deplorable only when it is excessive.`, kor: `자체로 받아들여져야 한다. 그것은 오직 지나칠 때만 비참해진다.` },
          { paraId: 4, eng: `Public men are nearly always being overblamed or overpraised, and the more knowledge they have of themselves,`, kor: `공인은 거의 항상 과도하게 비난받거나 과도하게 칭송받는다. 그들이 자신에 대해 더 많이` },
          { paraId: 4, eng: `the less likely they are to be unduly depressed by the former or to be unduly elated by the latter.`, kor: `알수록 전자에 의해 부당하게 낙담하거나 후자에 의해 부당하게 우쭐해질 가능성이 적어진다.` },
          { paraId: 5, eng: `No young man can possibly see immediately the qualities of a great book.`, kor: `어떤 젊은이도 훌륭한 책의 가치를 즉시 알아볼 수는 없다.` },
          { paraId: 5, eng: `Remember that in many cases it has taken mankind hundreds of years to find out all that is in such a book.`, kor: `많은 경우 인류가 그런 책에 담긴 모든 것을 찾아내는 데 수백 년이 걸렸음을 기억하라.` },
          { paraId: 5, eng: `But it depends upon a man's knowledge and experience of life, whether the text will unfold new meanings to him.`, kor: `하지만 그 텍스트가 새로운 의미를 드러내 줄지는 그 사람의 지식과 삶의 경험에 달려 있다.` },
          { paraId: 6, eng: `I have encountered nothing on Apollo 15 or in this age of space and science that dilutes my faith in God.`, kor: `나는 아폴로 15호에서나 이 우주와 과학의 시대에서 신에 대한 나의 믿음을 희석시킬 만한 어떤 것도 마주하지 못했다.` },
          { paraId: 6, eng: `While I was on the moon, in fact, I felt a sense of inspiration,`, kor: `사실 내가 달에 있는 동안 누군가가 나와` },
          { paraId: 6, eng: `a feeling that someone was with me, watching over me, protecting me.`, kor: `함께하며 나를 지켜보고 보호해 준다는 영감을 느꼈다.` },
          { paraId: 6, eng: `There were several times when tasks seemed to be impossible — but they worked out all right every time.`, kor: `임무가 불가능해 보였던 적이 여러 번 있었지만, 매번 잘 해결되었다.` },
        ],
        "Day24": [
          { paraId: 0, eng: `His father, who had been a great general of the armies of Athens,`, kor: `아테네 군대의 위대한 장군이었던 그의 아버지는 아들이 아주 어렸을 때 세상을 떠났고,` },
          { paraId: 0, eng: `died when the boy was very young, and left his money in the care of some bad men, who spent it.`, kor: `돈을 나쁜 사람들에게 맡겼는데 그들이 그것을 다 써버렸다.` },
          { paraId: 1, eng: `I would not claim for a moment that those years I spent at that hospital as a doctor gave me a complete knowledge of human nature.`, kor: `병원에서 의사로 보낸 그 세월이 나에게 인간 본성에 대한 완전한 지식을 주었다고는 단` },
          { paraId: 1, eng: `I do not suppose anyone can hope to have that.`, kor: `한 순간도 주장하지 않겠다. 누구도 그것을 가질 수 있다고 생각하지 않는다. 나는 40년` },
          { paraId: 1, eng: `I have been studying it, consciously or unconsciously, for forty years and I still find men unaccountable;`, kor: `동안 의식적으로든 무의식적으로든 그것을 연구해 왔지만 여전히 인간은 설명하기 어렵다고 느낀다. 내가` },
          { paraId: 1, eng: `people I know intimately can surprise me by some action of which I never thought them capable.`, kor: `잘 아는 사람들조차 내가 전혀 예상치 못한 행동으로 나를 놀라게 할 수 있다.` },
          { paraId: 2, eng: `I had stepped into a new life.`, kor: `나는 새로운 삶으로 발을 내디뎠다.` },
          { paraId: 2, eng: `Between the man I had been and that which I now became there was a very notable difference.`, kor: `과거의 나와 현재의 나 사이에는 매우 현저한 차이가 있었다.` },
